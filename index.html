<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<title>SPACE DOCK</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#000;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100dvh;
  padding-top: env(safe-area-inset-top, 0px);
  box-sizing:border-box;
  overflow:hidden;
  font-family:monospace;
}
canvas { image-rendering:pixelated; image-rendering:crisp-edges; cursor:none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');
const hint = { textContent: '' };
ctx.imageSmoothingEnabled = false;

const W = 160, H = 240;
const safeTop = parseFloat(getComputedStyle(document.body).paddingTop) || 0;
const SCALE = Math.min(window.innerWidth / W, (window.innerHeight - 30 - safeTop) / H);
C.width  = Math.round(W * SCALE);
C.height = Math.round(H * SCALE);
ctx.scale(SCALE, SCALE);

const P = [
  '#000000','#1a1a2e','#16213e','#0f3460',
  '#e94560','#ff6b35','#f5c518','#4a90d9',
  '#7ed321','#aaaaaa','#cccccc','#ffffff',
  '#50e3c2','#bd10e0','#ffaaff','#88ff88'
];

// ── TUNING (base values for PC; mobile applies SPD_MULT) ──────────
const TSHIP_DX    = 0.7;   // top ship horiz speed (px/frame)
const S1_SPD_BASE = 0.45;  // stage1: capsule fall speed base
const S1_SPD_ACC  = 0.12;  // stage1: fall speed gain per catch
const S2_BAR_BASE = 1.5;   // stage2: bar oscillation (deg/frame)
const S2_BAR_ACC  = 0.5;   // stage2: bar speed gain per hit
const S2_CAP_SPD  = 2.5;   // stage2: capsule launch speed (px/frame)
// ──────────────────────────────────────────────────────────────────

const IS_TOUCH = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
const SPD_MULT    = IS_TOUCH ? 2.0 : 1.0;
const S1_SPD_MULT   = IS_TOUCH ? 2.0 : 0.5;  // Stage1専用乗数（PC=0.5、スマホ=2.0）
const S1_CAP_MULT   = IS_TOUCH ? 1.0 : 1.5;  // Stage1カプセル速度補正（PC=1.5倍）
const S1_SPAWN_MULT = IS_TOUCH ? 1.0 : 2.0;  // Stage1スポーン間隔補正（PC=2倍）
const S2_SPD_MULT   = IS_TOUCH ? 0.5 : 0.25; // Stage2専用乗数
const S2_CAP_MULT   = 1.0;                    // Stage2カプセル追加乗数

let gs;
let state = 'START';
let winPhase = 0, winTick = 0, pipeY = 0;
let selectedStage = 1;
let s3TapDir = null, s3TapTimer = 0;
let s3CountTick = 0;
let s3GuideTick = 0;
const GUIDE_ORDER = ['up','right','left','down'];
const POCKETS4_POS = [
  // Left O ring: center (80,78), r=16, 8 pockets clockwise from right
  [96,78],[91,67],[80,62],[69,67],[64,78],[69,89],[80,94],[91,89],
  // Right O ring: center (134,78), r=16, 8 pockets clockwise from right
  [150,78],[145,67],[134,62],[123,67],[118,78],[123,89],[134,94],[145,89],
];
let s4FlashTimer = 0;
let s4LeftTouch = false, s4RightTouch = false;
let s4LeftFlipTimer = 0, s4RightFlipTimer = 0;
const BUMPERS4 = [[85, 155], [130, 155], [80, 50], [134, 50]];
const WALLS5 = [
  // Corner cuts (angled corners = spaceship hull feel)
  {x:0,y:1},{x:1,y:1},{x:0,y:2},          // top-left corner
  {x:19,y:1},{x:18,y:1},{x:19,y:2},        // top-right corner
  {x:0,y:28},{x:1,y:28},{x:0,y:27},        // bottom-left corner
  {x:19,y:28},{x:18,y:28},{x:19,y:27},     // bottom-right corner
  // Internal obstacles (equipment racks / bulkheads)
  {x:1,y:9},{x:1,y:10},{x:1,y:11},         // left rack
  {x:18,y:17},{x:18,y:18},{x:18,y:19},     // right rack
  {x:9,y:7},{x:10,y:7},                     // top-center post
  {x:9,y:21},{x:10,y:21},                   // bottom-center post
];
let s4BumperFlash = [0, 0, 0, 0];
let gameoverLockTimer = 0;
let s5MoveTimer = 0;
let s5Dir = { x: 1, y: 0 }, s5NextDir = { x: 1, y: 0 };
let s5CheerTimer = 0;

function launchStage(n) {
  if (n === 1) newGame1();
  else if (n === 2) newGame2();
  else if (n === 3) newGame3();
  else if (n === 4) newGame4();
  else newGame5();
}

function newGame1() {
  gs = {
    stageNum: 1,
    tship: { x: W/2, y: 18, dx: 1, spd: TSHIP_DX * S1_SPD_MULT * 0.5 },
    bship: { x: W/2, y: H - 18 },
    astro: { x: W/2, y: H - 30 },
    caps:  [],
    score: 0, miss: 0,
    baseSpeed: S1_SPD_BASE * S1_SPD_MULT,
    spawnTick: 0, spawnInterval: 180 * S1_SPAWN_MULT, spawnBase: 240 * S1_SPAWN_MULT,
    frame: 0, flashTimer: 0,
  };
  winPhase = 0; winTick = 0; pipeY = 0;
  state = 'PLAY1';
  hint.textContent = '← → / TAP to move';
}

function newGame2() {
  gs = {
    stageNum: 2,
    tship: { x: W/2, y: 18, dx: TSHIP_DX * S2_SPD_MULT },
    bship: { x: W/2, y: H - 18 },
    astro: { x: W/2, y: H - 30 },
    caps:  [],
    score: 0, miss: 0,
    barAngle: 0, barDir: 1,
    barSpeed: S2_BAR_BASE * S2_SPD_MULT,
    frame: 0, flashTimer: 0,
  };
  winPhase = 0; winTick = 0; pipeY = 0;
  state = 'PLAY2';
  hint.textContent = 'SPACE / TAP to fire';
}

// --- Input ---
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ' || e.key === 'Enter') { handleAction(); e.preventDefault(); }
  if (state === 'SELECT') {
    if (e.key === 'ArrowUp'   || e.key === 'ArrowLeft')  { selectedStage = selectedStage > 1 ? selectedStage - 1 : 5; e.preventDefault(); }
    if (e.key === 'ArrowDown' || e.key === 'ArrowRight') { selectedStage = selectedStage < 5 ? selectedStage + 1 : 1; e.preventDefault(); }
  }
  if (state === 'PLAY3') {
    if (e.key === 'ArrowLeft')  { handleInput3('left');  e.preventDefault(); }
    if (e.key === 'ArrowRight') { handleInput3('right'); e.preventDefault(); }
    if (e.key === 'ArrowUp')    { handleInput3('up');    e.preventDefault(); }
    if (e.key === 'ArrowDown')  { handleInput3('down');  e.preventDefault(); }
  }
  if (state === 'PLAY4') {
    if (e.key === 'z' || e.key === 'Z' || e.key === 'x' || e.key === 'X') e.preventDefault();
  }
  if (state === 'PLAY5') {
    if (e.key === 'ArrowLeft'  && s5Dir.x !== 1)  { s5NextDir = {x:-1,y:0}; e.preventDefault(); }
    if (e.key === 'ArrowRight' && s5Dir.x !== -1) { s5NextDir = {x:1,y:0};  e.preventDefault(); }
    if (e.key === 'ArrowUp'    && s5Dir.y !== 1)  { s5NextDir = {x:0,y:-1}; e.preventDefault(); }
    if (e.key === 'ArrowDown'  && s5Dir.y !== -1) { s5NextDir = {x:0,y:1};  e.preventDefault(); }
  }
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

let touchX = null;
let touchY = null;
C.addEventListener('touchstart', e => {
  touchX = e.touches[0].clientX;
  touchY = e.touches[0].clientY;
  if (state === 'PLAY3') {
    const rect = C.getBoundingClientRect();
    const gx = (e.touches[0].clientX - rect.left) / SCALE;
    const gy = (e.touches[0].clientY - rect.top)  / SCALE;
    const dx = gx - W/2, dy = gy - (H * 3/4);
    if (Math.abs(dx) > Math.abs(dy)) handleInput3(dx > 0 ? 'right' : 'left');
    else handleInput3(dy > 0 ? 'down' : 'up');
  } else if (state === 'PLAY4') {
    s4LeftTouch = false; s4RightTouch = false;
    for (let i = 0; i < e.touches.length; i++) {
      if (e.touches[i].clientX < window.innerWidth / 2) s4LeftTouch = true; else s4RightTouch = true;
    }
  } else if (state === 'SELECT') {
    const rect = C.getBoundingClientRect();
    const gy = (e.touches[0].clientY - rect.top) / SCALE;
    if      (gy < 66)  { selectedStage = 1; launchStage(1); }
    else if (gy < 82)  { selectedStage = 2; launchStage(2); }
    else if (gy < 98)  { selectedStage = 3; launchStage(3); }
    else if (gy < 114) { selectedStage = 4; launchStage(4); }
    else if (gy < 130) { selectedStage = 5; launchStage(5); }
    else               { launchStage(selectedStage); }
  } else if (state === 'PLAY5') {
    // swipe start recorded above (touchX/touchY); direction decided in touchend
  } else if (state !== 'PLAY1') {
    handleAction();
  }
  e.preventDefault();
}, { passive: false });
C.addEventListener('touchmove', e => {
  if (state === 'PLAY1' && touchX !== null) {
    const dx = (e.touches[0].clientX - touchX) / SCALE;
    gs.astro.x = clamp(gs.astro.x + dx * 0.8, 8, W - 8);
    touchX = e.touches[0].clientX;
  } else if (state === 'PLAY4') {
    s4LeftTouch = false; s4RightTouch = false;
    for (let i = 0; i < e.touches.length; i++) {
      if (e.touches[i].clientX < window.innerWidth / 2) s4LeftTouch = true; else s4RightTouch = true;
    }
  }
  e.preventDefault();
}, { passive: false });
C.addEventListener('touchend', e => {
  if (state === 'PLAY5' && touchX !== null && touchY !== null) {
    const dx = e.changedTouches[0].clientX - touchX;
    const dy = e.changedTouches[0].clientY - touchY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 15) {
      if (dx > 0 && s5Dir.x !== -1) s5NextDir = {x:1,y:0};
      else if (dx < 0 && s5Dir.x !== 1) s5NextDir = {x:-1,y:0};
    } else if (Math.abs(dy) > 15) {
      if (dy > 0 && s5Dir.y !== -1) s5NextDir = {x:0,y:1};
      else if (dy < 0 && s5Dir.y !== 1) s5NextDir = {x:0,y:-1};
    }
  }
  touchX = null;
  touchY = null;
  if (state === 'PLAY4') {
    s4LeftTouch = false; s4RightTouch = false;
    for (let i = 0; i < e.touches.length; i++) {
      if (e.touches[i].clientX < window.innerWidth / 2) s4LeftTouch = true; else s4RightTouch = true;
    }
  } else { s4LeftTouch = false; s4RightTouch = false; }
}, { passive: false });
// Document-level touch: catches touches outside canvas (dead zone on sides)
function updateS4TouchDoc(e) {
  if (state !== 'PLAY4') return;
  s4LeftTouch = false; s4RightTouch = false;
  for (let i = 0; i < e.touches.length; i++) {
    if (e.touches[i].clientX < window.innerWidth / 2) s4LeftTouch = true; else s4RightTouch = true;
  }
}
document.addEventListener('touchstart', updateS4TouchDoc, { passive: true });
document.addEventListener('touchmove',  updateS4TouchDoc, { passive: true });
document.addEventListener('touchend',   updateS4TouchDoc, { passive: true });

C.addEventListener('click', e => {
  if (state === 'PLAY3') {
    const rect = C.getBoundingClientRect();
    const gx = (e.clientX - rect.left) / SCALE;
    const gy = (e.clientY - rect.top)  / SCALE;
    const dx = gx - W/2, dy = gy - (H * 3/4);
    if (Math.abs(dx) > Math.abs(dy)) handleInput3(dx > 0 ? 'right' : 'left');
    else handleInput3(dy > 0 ? 'down' : 'up');
  } else if (state === 'SELECT') {
    const rect = C.getBoundingClientRect();
    const gy = (e.clientY - rect.top) / SCALE;
    if      (gy < 66)  { selectedStage = 1; launchStage(1); }
    else if (gy < 82)  { selectedStage = 2; launchStage(2); }
    else if (gy < 98)  { selectedStage = 3; launchStage(3); }
    else if (gy < 114) { selectedStage = 4; launchStage(4); }
    else if (gy < 130) { selectedStage = 5; launchStage(5); }
    else               { launchStage(selectedStage); }
  } else {
    handleAction();
  }
});

function handleAction() {
  if (state === 'WIN_ANIM' || state === 'WIN1' || state === 'WIN2' || state === 'PLAY3' || state === 'COUNTDOWN3' || state === 'GUIDE3' || state === 'PLAY4' || state === 'INTRO4' || state === 'PLAY5' || state === 'INTRO5') return;
  if (state === 'PLAY2')    { fireCapsule(); return; }
  if (state === 'PLAY1')    return;
  if (state === 'WIN5') { if (winTick > 200) { state = 'SELECT'; selectedStage = 1; hint.textContent = IS_TOUCH ? 'TAP to select' : 'ARROWS + SPACE'; } return; }
  if (state === 'WIN3') { if (winTick > 200) newGame4(); return; }
  if (state === 'WIN4' || state === 'GAMEOVER') {
    if (state === 'GAMEOVER' && gameoverLockTimer > 0) return;
    state = 'SELECT'; selectedStage = 1;
    hint.textContent = IS_TOUCH ? 'TAP to select' : 'ARROWS + SPACE';
    return;
  }
  if (state === 'START') {
    state = 'SELECT'; selectedStage = 1;
    hint.textContent = IS_TOUCH ? 'TAP to select' : 'ARROWS + SPACE';
    return;
  }
  if (state === 'SELECT') { launchStage(selectedStage); return; }
}

function fireCapsule() {
  if (!gs || gs.caps.length > 0) return;
  const rad = gs.barAngle * Math.PI / 180;
  const spd = S2_CAP_SPD * S2_SPD_MULT * S2_CAP_MULT;
  gs.caps.push({
    x: gs.astro.x, y: gs.astro.y - 10,
    vx: Math.sin(rad) * spd, vy: -Math.cos(rad) * spd,
  });
}

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function px(x, y, w, h, ci) { ctx.fillStyle = P[ci]; ctx.fillRect(x|0, y|0, w, h); }

// --- Drawing ---
function drawStars() {
  for (let i = 0; i < 40; i++) {
    px((i*37+11)%W, (i*73+19)%H, 1, 1, (i%3===0)?11:9);
  }
}

function drawTopShip(x, y) {
  px(x-12, y-3, 24, 1, 6);
  px(x-18, y-1, 36, 3, 6);
  px(x-15, y,   30, 1, 5);
  px(x-12, y+3, 24, 1, 6);
  px(x-20, y,   2,  1, 9);
  px(x+18, y,   2,  1, 9);
  px(x-2,  y-2, 4,  5, 9);
  px(x-8,  y-1, 4,  1, 10);
  px(x-21, y,   2,  1, 4);
}

function drawBottomShip(x, y) {
  px(x-4,  y+7,  8,  3, 5);
  px(x-12, y-3,  24, 8, 11);
  px(x-6,  y-7,  12, 4, 10);
  px(x-3,  y-11, 6,  4, 11);
  px(x+8,  y-1,  3,  4, 10);
  px(x-10, y-1,  20, 1, 9);
}

function drawAstronaut(x, y, flash) {
  const c = flash ? 6 : 4;
  ctx.strokeStyle = P[9]; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo((gs.bship.x+10)|0, (gs.bship.y-2)|0);
  ctx.lineTo(x|0, (y-6)|0);
  ctx.stroke();
  px(x-3, y-10, 6, 5, c);
  px(x-2, y-9,  4, 3, 12);
  px(x-4, y-5,  8, 7, c);
  px(x-8, y-4,  4, 3, 10);
  px(x+4, y-4,  4, 3, 10);
  px(x-3, y+2,  3, 4, c);
  px(x+1, y+2,  3, 4, c);
}

function drawCapsule(x, y) {
  px(x-2, y-6, 4, 1, 10);
  px(x-3, y-5, 6, 8, 9);
  px(x-1, y-4, 2, 6, 11);
  px(x-2, y+3, 4, 1, 10);
}

function drawPipe(x1, y1, x2, y2) {
  ctx.strokeStyle = P[9]; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(x1|0, y1|0); ctx.lineTo(x2|0, y2|0); ctx.stroke();
  ctx.strokeStyle = P[10]; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo((x1-1)|0, y1|0); ctx.lineTo((x2-1)|0, y2|0); ctx.stroke();
}

function drawAimGuides(x, y) {
  const base = y - 12;
  ctx.lineWidth = 1;
  for (const a of [-45, 0, 45]) {
    const rad = a * Math.PI / 180;
    ctx.strokeStyle = (a === 0) ? P[3] : P[2];
    ctx.beginPath();
    ctx.moveTo(x|0, base|0);
    ctx.lineTo((x + Math.sin(rad)*20)|0, (base - Math.cos(rad)*20)|0);
    ctx.stroke();
  }
}

function drawBar(x, y, angle) {
  const rad = angle * Math.PI / 180;
  const ex = x + Math.sin(rad) * 22, ey = y - 12 - Math.cos(rad) * 22;
  ctx.strokeStyle = P[6]; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(x|0, (y-12)|0); ctx.lineTo(ex|0, ey|0); ctx.stroke();
  px(ex-1|0, ey-1|0, 3, 3, 6);
}

function drawHUD1() {
  ctx.fillStyle = P[12]; ctx.font = '6px monospace';
  ctx.fillText('CATCH ' + gs.score + '/15', 2, 8);
  ctx.fillStyle = P[4];
  ctx.fillText('MISS ' + gs.miss + '/3', W-34, 8);
  px(2, H-4, W-4, 2, 1);
  px(2, H-4, ((gs.score/15)*(W-4))|0, 2, 8);
}

function drawHUD2() {
  ctx.fillStyle = P[12]; ctx.font = '6px monospace';
  ctx.fillText('HIT ' + gs.score + '/5', 2, 8);
  ctx.fillStyle = P[4];
  ctx.fillText('MISS ' + gs.miss + '/10', W-40, 8);
  px(2, H-4, W-4, 2, 1);
  px(2, H-4, ((gs.score/5)*(W-4))|0, 2, 8);
}

function drawCenterText(lines, colors) {
  const lineH = 10, total = lines.length * lineH;
  let sy = H/2 - total/2;
  lines.forEach((txt, i) => {
    ctx.fillStyle = P[colors[i] ?? 11];
    ctx.font = (i===0 ? '8px' : '6px') + ' monospace';
    ctx.textAlign = 'center';
    ctx.fillText(txt, W/2, sy + i*lineH);
    ctx.textAlign = 'left';
  });
}

// --- Update Stage 1 ---
function update1() {
  const g = gs; g.frame++;
  g.tship.spd = Math.min(g.tship.spd + 0.003, TSHIP_DX * S1_SPD_MULT);
  g.tship.x += g.tship.dx * g.tship.spd;
  if (g.tship.x > W-18) g.tship.dx = -1;
  if (g.tship.x < 18)   g.tship.dx =  1;

  const spd = 1.8;
  if (keys['ArrowLeft']  || keys['a'] || keys['A']) g.astro.x = clamp(g.astro.x - spd, 8, W-8);
  if (keys['ArrowRight'] || keys['d'] || keys['D']) g.astro.x = clamp(g.astro.x + spd, 8, W-8);

  g.spawnTick++;
  if (g.spawnTick >= g.spawnInterval && g.caps.length === 0) {
    g.spawnTick = 0;
    g.caps.push({ x: g.tship.x + (Math.random()-0.5)*16, y: g.tship.y+10,
                  spd: (g.baseSpeed + Math.random()*0.4*S1_SPD_MULT) * S1_CAP_MULT });
    const minI = 120 * S1_SPAWN_MULT;
    if (g.spawnBase > minI) g.spawnBase -= 4;
    g.spawnInterval = minI + Math.random() * (g.spawnBase - minI);
  }

  if (g.flashTimer > 0) g.flashTimer--;
  for (let i = g.caps.length-1; i >= 0; i--) {
    const c = g.caps[i]; c.y += c.spd;
    const ax = g.astro.x, ay = g.astro.y;
    if (c.y > ay-12 && c.y < ay+8 && Math.abs(c.x-ax) < 10) {
      g.caps.splice(i,1); g.score++;
      g.baseSpeed += S1_SPD_ACC * S1_SPD_MULT;
      g.flashTimer = 8;
      if (g.score >= 15) { state='WIN1'; winTick=0; }
      continue;
    }
    if (c.y > H) { g.caps.splice(i,1); g.miss++; if (g.miss >= 3) state='GAMEOVER'; }
  }
}

// --- Update Stage 2 ---
function update2() {
  const g = gs; g.frame++;
  g.tship.x += g.tship.dx;
  if (g.tship.x > W-18) g.tship.dx = -TSHIP_DX * S2_SPD_MULT;
  if (g.tship.x < 18)   g.tship.dx =  TSHIP_DX * S2_SPD_MULT;

  g.barAngle += g.barSpeed * g.barDir;
  if (g.barAngle >= 45)  { g.barAngle = 45;  g.barDir = -1; }
  if (g.barAngle <= -45) { g.barAngle = -45; g.barDir =  1; }

  if (g.flashTimer > 0) g.flashTimer--;
  for (let i = g.caps.length-1; i >= 0; i--) {
    const c = g.caps[i]; c.x += c.vx; c.y += c.vy;
    const tx = g.tship.x, ty = g.tship.y;
    if (c.y > ty-6 && c.y < ty+6 && Math.abs(c.x-tx) < 20) {
      g.caps.splice(i,1); g.score++;
      g.barSpeed += S2_BAR_ACC * S2_SPD_MULT;
      g.flashTimer = 8;
      if (g.score >= 5) { state='WIN_ANIM'; winPhase=0; winTick=0; pipeY=g.tship.y+8; }
      continue;
    }
    if (c.y < -10 || c.x < -10 || c.x > W+10) {
      g.caps.splice(i,1); g.miss++; if (g.miss >= 10) state='GAMEOVER';
    }
  }
}

// --- Win Animation ---
function updateWinAnim() {
  winTick++;
  const g = gs;
  g.tship.x += (W/2 - g.tship.x) * 0.07;
  g.tship.y += (H/2-60 - g.tship.y) * 0.04;
  const nextState = g.stageNum === 1 ? 'WIN1' : 'WIN2';
  if (winPhase === 0) {
    if (winTick > 80) { winPhase = 1; winTick = 0; pipeY = gs.tship.y + 8; }
  } else if (winPhase === 1) {
    const target = g.bship.y - 12;
    pipeY = Math.min(pipeY + 2, target);
    if (pipeY >= target) { winPhase = 2; winTick = 0; }
  } else if (winPhase === 2) {
    if (winTick > 60) { g.tship.x = W/2; g.tship.y = H/2-60; state = nextState; }
  }
}

         gesture: null, timer: 0, phase: 'show',
         resultTimer: 0, resultOk: false, rockyState: 'idle', frame: 0 };

  nextRound3();
  s3CountTick = 0;
  s3GuideTick = 0;
  state = 'GUIDE3';
  hint.textContent = '';
}

function nextRound3() {
  const g = gs;
  g.gesture    = GESTURES3[Math.floor(Math.random() * 4)];
  g.timer      = Math.max(54, Math.round(180 - g.score * (180-54) / 19));
  g.phase      = 'show';
  g.rockyState = 'idle';
}

function update3() {
  const g = gs; g.frame++;
  if (s3TapTimer > 0) s3TapTimer--;
  if (g.phase === 'show') {
    if (--g.timer <= 0) {
      g.miss++; g.resultOk = false; g.rockyState = 'sad';
      g.phase = 'result'; g.resultTimer = 40;
    }
  } else if (g.phase === 'result') {
    if (--g.resultTimer <= 0) {
      if (g.miss >= 3)   { state = 'GAMEOVER'; return; }
      if (g.score >= 20) { state = 'WIN3'; winTick = 0; return; }
      g.phase = 'neutral'; g.neutralTimer = 60; g.gesture = null; g.rockyState = 'idle';
    }
  } else if (g.phase === 'neutral') {
    if (--g.neutralTimer <= 0) nextRound3();
  }
}

function handleInput3(dir) {
  if (!gs || gs.stageNum !== 3 || gs.phase !== 'show') return;
  s3TapDir = dir; s3TapTimer = 20;
  const g = gs;
  if (dir === g.gesture) {
    g.score++; g.resultOk = true;
    if      (dir === 'up')    g.rockyState = 'cheer_up';
    else if (dir === 'left')  g.rockyState = 'point_left';
    else if (dir === 'right') g.rockyState = 'point_right';
    else                      g.rockyState = 'thumbs_down';
  } else {
    g.miss++;  g.resultOk = false; g.rockyState = 'sad';

}

function newGame4() {
  gs = { stageNum: 4, miss: 0, frame: 0,
         ball: { x: 82, y: 185, vx: 0.35, vy: -2.3 },
         leftPaddle: false, rightPaddle: false,
         leftPaddlePrev: false, rightPaddlePrev: false,
         pockets: Array(16).fill(false) };
  winTick = 0; s4FlashTimer = 0;
  s4LeftTouch = false; s4RightTouch = false;
  s4BumperFlash = [0, 0, 0, 0];
  s4LeftFlipTimer = 0; s4RightFlipTimer = 0;
  state = 'INTRO4';
  hint.textContent = '';
}

function update4() {
  const g = gs; g.frame++;
  if (s4FlashTimer > 0) s4FlashTimer--;
  for (let i = 0; i < s4BumperFlash.length; i++) if (s4BumperFlash[i] > 0) s4BumperFlash[i]--;

  const prevL = g.leftPaddle, prevR = g.rightPaddle;
  g.leftPaddle  = !!keys['z'] || !!keys['Z'] || s4LeftTouch;
  g.rightPaddle = !!keys['x'] || !!keys['X'] || s4RightTouch;
  const leftJust  = g.leftPaddle  && !prevL;
  const rightJust = g.rightPaddle && !prevR;

  const b = g.ball;
  b.vy += 0.022; // gravity (2/3 speed)
  if (b.vy > 2.6) b.vy = 2.6;
  b.x += b.vx; b.y += b.vy;

  // Wall bounces
  if (b.x < 58)  { b.x = 58;  b.vx =  Math.abs(b.vx); }
  if (b.x > W-3) { b.x = W-3; b.vx = -Math.abs(b.vx); }
  if (b.y < 14)  { b.y = 14;  b.vy =  Math.abs(b.vy); }

  // Bumper collisions
  for (let i = 0; i < BUMPERS4.length; i++) {
    const [bx, by] = BUMPERS4[i];
    const dx = b.x - bx, dy = b.y - by;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 9 && dist > 0.1) {
      const nx = dx/dist, ny = dy/dist;
      const dot = b.vx*nx + b.vy*ny;
      if (dot < 0) {
        b.vx -= 2*dot*nx * 1.15;
        b.vy -= 2*dot*ny * 1.15;
        b.vx = Math.max(-2.6, Math.min(2.6, b.vx));
        b.vy = Math.max(-2.6, Math.min(2.6, b.vy));
      }
      b.x = bx + nx*10; b.y = by + ny*10;
      s4BumperFlash[i] = 12;
    }
  }

  // Paddle collision with angled surfaces (cy4=210)
  // Left: pivot x=58; rest outer=y208 inner=y218 (droop); active outer=y210 inner=y194 (flip up)
  // Right: pivot x=154; mirror of left
  const cy4 = 210;
  // Left paddle: normal range x=58-100; on just-press extends to x=107 (gap rescue)
  const leftXMax = leftJust ? 107 : 100;
  if (b.x >= 58 && b.x <= leftXMax && (b.vy > 0 || leftJust)) {
    const t = Math.min((b.x - 58) / 42, 1);
    const surfY = g.leftPaddle ? (cy4 - t * 16) : (cy4 - 2 + t * 10);
    if (b.y + 2 >= surfY && b.y + 2 < surfY + 30) {
      b.y = surfY - 3;
      if (g.leftPaddle) {
        if (leftJust) {
          b.vy = -Math.abs(b.vy);
          b.vx += t * 1.1;
          if (Math.abs(b.vy) < 2.5) b.vy = -2.5;
        } else {
          // Held: damped bounce, ball rolls outward toward pivot (x=58)
          b.vy = -Math.abs(b.vy) * 0.4;
          b.vx = b.vx * 0.6 - 0.3;
        }
      } else {
        // Rest: heavy damping, rolls toward drain
        b.vy = -Math.abs(b.vy) * 0.15;
        b.vx = b.vx * 0.5 + 0.4;
      }
      b.vx = Math.max(-2.6, Math.min(2.6, b.vx));
    }
  }
  // Right paddle: normal range x=114-157; on just-press extends to x=107 (gap rescue)
  const rightXMin = rightJust ? 107 : 114;
  if (b.x >= rightXMin && b.x <= W-3 && (b.vy > 0 || rightJust)) {
    const t = Math.min((W-3 - b.x) / 43, 1);
    const surfY = g.rightPaddle ? (cy4 - t * 16) : (cy4 - 2 + t * 10);
    if (b.y + 2 >= surfY && b.y + 2 < surfY + 30) {
      b.y = surfY - 3;
      if (g.rightPaddle) {
        if (rightJust) {
          b.vy = -Math.abs(b.vy);
          b.vx -= t * 1.1;
          if (Math.abs(b.vy) < 2.5) b.vy = -2.5;
        } else {
          // Held: damped bounce, ball rolls outward toward pivot (x=157)
          b.vy = -Math.abs(b.vy) * 0.4;
          b.vx = b.vx * 0.6 + 0.3;
        }
      } else {
        b.vy = -Math.abs(b.vy) * 0.15;
        b.vx = b.vx * 0.5 - 0.4;
      }
      b.vx = Math.max(-2.6, Math.min(2.6, b.vx));
    }
  }

  // Fall off bottom
  if (b.y > H + 4) {
    g.miss++;
    s4FlashTimer = 40;
    if (g.miss >= 3) { state = 'GAMEOVER'; gameoverLockTimer = 120; return; }
    const side = Math.random() > 0.5 ? 1 : -1;
    b.x = 107 - side * 25;  // x=82 (left paddle) or x=132 (right paddle)
    b.y = 185;
    b.vx = side * 0.23;
    b.vy = -(1.5 + Math.random() * 0.2);
  }

  // Pocket collision — both directions
  for (let i = 0; i < POCKETS4_POS.length; i++) {
    if (g.pockets[i]) continue;
    const [bx, by] = POCKETS4_POS[i];
    if (Math.abs(b.x - bx) < 7 && Math.abs(b.y - by) < 7) {
      g.pockets[i] = true;
      b.vy = -b.vy;
      if (Math.abs(b.vy) < 2) b.vy = b.vy > 0 ? 2 : -2;
      if (g.pockets.every(p => p)) { state = 'WIN4'; winTick = 0; return; }
    }
  }
}

// --- Stage 5 ---
// Snake: Rocky collects space debris to build a tether/chain for the Hail Mary

function newGame5() {
  const startX = 10, startY = 14;
  gs = {
    stageNum: 5,
    snake: [{x:startX,y:startY},{x:startX-1,y:startY},{x:startX-2,y:startY}],
    item: null,
    frame: 0,
  };
  s5Dir = {x:1,y:0}; s5NextDir = {x:1,y:0};
  s5MoveTimer = 0; s5CheerTimer = 0;
  spawnItem5();
  winTick = 0;
  state = 'PLAY5';
  hint.textContent = IS_TOUCH ? 'SWIPE to move' : '← → ↑ ↓';
}

function spawnItem5() {
  const g = gs;
  let ix, iy;
  do {
    ix = Math.floor(Math.random() * 20);
    iy = 1 + Math.floor(Math.random() * 27); // cells 1..27 (first row is HUD)
  } while (g.snake.some(s => s.x===ix && s.y===iy) || WALLS5.some(w => w.x===ix && w.y===iy));
  g.item = {x:ix, y:iy};
}

function update5() {
  const g = gs; g.frame++;
  // Speed increases as chain grows: starts slow, 1 frame faster per 2 items, min 3 frames
  const baseSpeed = 10;
  const minSpeed = 4;
  const SPEED = Math.max(minSpeed, baseSpeed - Math.floor((g.snake.length - 3) / 2));
  if (s5CheerTimer > 0) s5CheerTimer--;
  if (++s5MoveTimer < SPEED) return;
  s5MoveTimer = 0;
  s5Dir = s5NextDir;
  const head = g.snake[0];
  const nx = head.x + s5Dir.x, ny = head.y + s5Dir.y;
  // Wall collision
  if (nx < 0 || nx >= 20 || ny < 1 || ny >= 29) { state = 'GAMEOVER'; return; }
  // Self collision
  if (g.snake.some(s => s.x===nx && s.y===ny) || WALLS5.some(w => w.x===nx && w.y===ny)) { state = 'GAMEOVER'; return; }
  // Move
  const grow = g.item && nx===g.item.x && ny===g.item.y;
  g.snake.unshift({x:nx, y:ny});
  if (!grow) g.snake.pop();
  else {
    s5CheerTimer = 12;
    if (g.snake.length >= 15) { state = 'WIN5'; winTick = 0; return; }
    spawnItem5();
  }
}

function drawSnake5() {
  const g = gs;
  const CS = 8; // cell size
  // Draw body (tail to head-1), skip index 0 (Rocky)
  for (let i = g.snake.length-1; i >= 1; i--) {
    const s = g.snake[i];
    const sx = s.x * CS, sy = 8 + s.y * CS; // offset 8px for HUD
    // chain link: gray block with highlight
    px(sx+1, sy+1, CS-2, CS-2, 9);   // gray body
    px(sx+2, sy+2, 2, 2, 10);        // highlight
    px(sx+CS-4, sy+CS-4, 2, 2, 1);   // shadow
  }
  // Draw Rocky at head (mini version that fits an 8px cell)
  const h = g.snake[0];
  const hx = h.x * CS + CS/2, hy = 8 + h.y * CS + CS/2;
  const rs = s5CheerTimer > 0 ? 'cheer_up' : 'idle';
  drawMiniRocky5(hx|0, hy|0, rs);
  // Draw item (floating debris)
  if (g.item) {
    const ix = g.item.x * CS, iy = 8 + g.item.y * CS;
    px(ix+2, iy+2, 4, 4, 9);   // asteroid body
    px(ix+3, iy+3, 2, 2, 11);  // shine
  }
}

function drawMiniRocky5(cx, cy, rs) {
  // 8×8 mini Rocky: rocky blob with emerald eye
  px(cx-3, cy-2, 6, 5, 9);   // body
  px(cx-4, cy-1, 8, 3, 9);   // wide mid
  px(cx-1, cy-3, 2, 2, 12);  // emerald eye
  px(cx-1, cy+3, 1, 2, 9);   // leg stub
  px(cx+1, cy+3, 1, 2, 9);
  if (rs === 'cheer_up') {
    px(cx-4, cy-4, 2, 3, 9); // left arm up
    px(cx+2, cy-4, 2, 3, 9); // right arm up
  } else {
    px(cx-4, cy-1, 2, 2, 9); // left arm mid
    px(cx+2, cy-1, 2, 2, 9); // right arm mid
  }
}

function drawHUD5() {
  const g = gs;
  ctx.fillStyle = P[12]; ctx.font = '6px monospace';
  ctx.fillText('CHAIN ' + (g.snake.length-1) + '/14', 2, 8);
  // length progress bar (no miss counter for snake)
  px(2, H-4, W-4, 2, 1);
  px(2, H-4, (((g.snake.length-1)/14)*(W-4))|0, 2, 12);
}

// --- Main Loop ---
function loop() {
  if (gameoverLockTimer > 0) gameoverLockTimer--;
  ctx.fillStyle = P[0]; ctx.fillRect(0, 0, W, H);
  drawStars();

  if (state === 'START') {
    drawTopShip(W/2, 24);
    drawBottomShip(W/2, H-24);
    drawCenterText(
      ['SPACE DOCK','','PRESS SPACE / TAP'],
      [12,0,6]
    );
    ctx.fillStyle = P[5]; ctx.font = '5px monospace';
    ctx.textAlign = 'right'; ctx.fillText('necobit', W-2, H-3);
    ctx.textAlign = 'left';
  }
  else if (state === 'SELECT') {
    drawTopShip(W/2, 24);
    ctx.textAlign = 'center';
    ctx.fillStyle = P[12]; ctx.font = '8px monospace';
    ctx.fillText('SELECT STAGE', W/2, 50);
    for (let i = 1; i <= 5; i++) {
      const y = 62 + (i-1) * 16;
      const sel = (i === selectedStage);
      ctx.fillStyle = sel ? P[6] : P[9];
      ctx.font = (sel ? '8px' : '6px') + ' monospace';
      ctx.fillText((sel ? '> ' : '  ') + 'STAGE ' + i, W/2, y);
    }
    ctx.fillStyle = P[3]; ctx.font = '6px monospace';
    ctx.fillText(IS_TOUCH ? 'TAP to select' : 'ARROWS + SPACE', W/2, 144);
    ctx.textAlign = 'left';
  }
  else if (state === 'PLAY1') {
    update1();
    const g = gs;
    drawTopShip(g.tship.x, g.tship.y);
    for (const c of g.caps) drawCapsule(c.x, c.y);
    drawBottomShip(g.bship.x, g.bship.y);
    drawAstronaut(g.astro.x, g.astro.y, g.flashTimer > 0);
    drawHUD1();
  }
  else if (state === 'PLAY2') {
    update2();
    const g = gs;
    drawTopShip(g.tship.x, g.tship.y);
    for (const c of g.caps) drawCapsule(c.x, c.y);
    drawBottomShip(g.bship.x, g.bship.y);
    drawAimGuides(g.astro.x, g.astro.y);
    drawBar(g.astro.x, g.astro.y, g.barAngle);
    drawAstronaut(g.astro.x, g.astro.y, g.flashTimer > 0);
    drawHUD2();
  }
  else if (state === 'WIN_ANIM') {
    updateWinAnim();
    const g = gs;
    drawBottomShip(g.bship.x, g.bship.y);
    drawTopShip(g.tship.x, g.tship.y);
    if (winPhase >= 1) drawPipe(g.tship.x, g.tship.y+8, g.tship.x, pipeY);
    if ((winTick >> 2) % 2 === 0) {
      ctx.fillStyle = P[12]; ctx.font = '8px monospace'; ctx.textAlign = 'center';
      ctx.fillText('DOCKING...', W/2, H/2+20); ctx.textAlign = 'left';
    }
  }
  else if (state === 'WIN1') {
    winTick++;
    drawTopShip(W/2, 24);
    drawBottomShip(W/2, H-24);
    drawCenterText(
      ['STAGE 1','COMPLETE!','','STAGE 2...'],
      [15,12,0,6]
    );
    if (winTick > 120) newGame2();
  }
  else if (state === 'WIN2') {
    winTick++;
    const g = gs;
    drawBottomShip(g.bship.x, g.bship.y);
    drawTopShip(W/2, H/2-60);
    drawPipe(W/2, H/2-52, W/2, g.bship.y-12);
    drawCenterText(
      ['STAGE 2','COMPLETE!','','STAGE 3...'],
      [15,12,0,6]
    );
    if (winTick > 120) newGame3();
  }
  else if (state === 'GUIDE3') {
    s3GuideTick++;
    if (s3GuideTick > 540) {
      s3CountTick = 0;
      state = 'COUNTDOWN3';
    } else {
      drawTunnel3();
      px(0, H/2, W, 1, 9);
      ctx.textAlign = 'center'; ctx.font = '6px monospace';
      ctx.fillStyle = P[6]; ctx.fillText('HOW TO PLAY', W/2, 14);
      ctx.textAlign = 'left';
      if (s3GuideTick <= 60) {
        drawAstronautS3(W/2, 68, 'idle');
        drawRockyS3(W/2, 178, 'idle');
        for (const d of GESTURES3) drawArrow3(d, false);
      } else {
        const guideIdx = Math.min(Math.floor((s3GuideTick - 61) / 120), 3);
        const guideDir = GUIDE_ORDER[guideIdx];
        const rockyGuide = guideDir === 'up' ? 'cheer_up' : guideDir === 'right' ? 'point_right' : guideDir === 'left' ? 'point_left' : 'thumbs_down';
        drawAstronautS3(W/2, 68, guideDir);
        drawRockyS3(W/2, 178, rockyGuide);
        for (const d of GESTURES3) drawArrow3(d, d === guideDir);
      }
    }
  }
  else if (state === 'COUNTDOWN3') {
    s3CountTick++;
    if (s3CountTick > 210) {
      state = 'PLAY3';
      hint.textContent = IS_TOUCH ? 'TAP direction on Rocky' : '← → ↑ ↓';
    } else {
      drawTunnel3();
      px(0, H/2, W, 1, 9);
      drawAstronautS3(W/2, 68, 'idle');
      drawRockyS3(W/2, 178, 'idle');
      for (const d of GESTURES3) drawArrow3(d, true);
      const n = s3CountTick <= 60 ? '3' : s3CountTick <= 120 ? '2' : s3CountTick <= 180 ? '1' : 'GO!';
      ctx.textAlign = 'center'; ctx.font = '36px monospace';
      ctx.fillStyle = s3CountTick > 180 ? P[8] : P[6];
      ctx.fillText(n, W/2, H/2 + 12);
      ctx.textAlign = 'left';
    }
  }
  else if (state === 'PLAY3') {
    update3();
    const g = gs;
    drawTunnel3();
    px(0, H/2, W, 1, 9);                      // dividing line
    drawAstronautS3(W/2, 68, g.gesture || 'idle');
    drawRockyS3(W/2, 178, g.rockyState);
    for (const d of GESTURES3) drawArrow3(d, s3TapDir === d && s3TapTimer > 0);
    drawHUD3();
  }
  else if (state === 'WIN3') {
    winTick++;
    drawTunnel3();
    // Characters side by side
    ctx.textAlign = 'center';
    ctx.fillStyle = P[15]; ctx.font = '8px monospace'; ctx.fillText('STAGE 3', W/2, 18);
    ctx.fillStyle = P[12]; ctx.fillText('CLEAR!', W/2, 30);
    ctx.fillStyle = P[14]; ctx.fillText('FRIENDS!', W/2, 46);
    ctx.font = '6px monospace'; ctx.fillText('2\u4EBA\u306F\u4EF2\u826F\u304F\u306A\u3063\u305F', W/2, 58);
    ctx.textAlign = 'left';
    drawAstronautS3(58, 158, 'up');
    ctx.fillStyle = P[4]; ctx.font = '12px monospace'; ctx.textAlign = 'center';
    ctx.fillText('\u2665', W/2, 148);
    ctx.textAlign = 'left';
    drawRockyS3(106, 172, 'cheer_up');
    if (winTick > 200) {
      ctx.fillStyle = P[6]; ctx.font = '6px monospace'; ctx.textAlign = 'center';
      ctx.fillText('PRESS SPACE / TAP', W/2, 228);
      ctx.textAlign = 'left';
    }
  }
  else if (state === 'INTRO4') {
    winTick++;
    const g = gs;
    // Draw full stage 4 field
    px(0, 0, 57, H, 1); px(55, 0, 2, H, 3);
    drawGraceS4(28, 185, false);
    ctx.fillStyle = P[9]; ctx.font = '5px monospace'; ctx.textAlign = 'center';
    ctx.fillText('GRACE', 28, 14); ctx.textAlign = 'left';
    ctx.beginPath(); ctx.arc(80, 78, 16, 0, Math.PI*2); ctx.strokeStyle = P[2]; ctx.lineWidth = 1; ctx.stroke();
    ctx.beginPath(); ctx.arc(134, 78, 16, 0, Math.PI*2); ctx.strokeStyle = P[2]; ctx.lineWidth = 1; ctx.stroke();
    px(80, 78, 54, 1, 9);
    for (let i = 0; i < POCKETS4_POS.length; i++) {
      const [bx, by] = POCKETS4_POS[i];
      px(bx-4, by-4, 8, 8, 1); px(bx-3, by-3, 6, 6, 2);
    }
    for (let i = 0; i < BUMPERS4.length; i++) drawBumper4(BUMPERS4[i][0], BUMPERS4[i][1], false);
    drawRockyPaddle4(107, 210, false, false);
    // Overlay text between O2 rings and upper bumpers
    ctx.textAlign = 'center';
    ctx.fillStyle = P[12]; ctx.font = '10px monospace';
    ctx.fillText('Rocky', 109, 115);
    ctx.fillStyle = P[11]; ctx.font = '8px monospace';
    ctx.fillText('make O2!', 109, 130);
    ctx.textAlign = 'left';
    if (winTick > 180) { state = 'PLAY4'; winTick = 0; }
  }
  else if (state === 'PLAY4') {
    update4();
    const g = gs;
    // Grace panel (left, behind wall)
    px(0, 0, 57, H, 1);
    px(55, 0, 2, H, 3);
    drawGraceS4(28, 185, false);
    ctx.fillStyle = P[9]; ctx.font = '5px monospace'; ctx.textAlign = 'center';
    ctx.fillText('GRACE', 28, 14); ctx.textAlign = 'left';
    // O2: two proton rings, each ring = one O atom, pockets = proton positions
    // Ring outlines (faint circles)
    ctx.beginPath(); ctx.arc(80, 78, 16, 0, Math.PI*2); ctx.strokeStyle = P[2]; ctx.lineWidth = 1; ctx.stroke();
    ctx.beginPath(); ctx.arc(134, 78, 16, 0, Math.PI*2); ctx.strokeStyle = P[2]; ctx.lineWidth = 1; ctx.stroke();
    // Bond line between rings (O-O)
    px(80, 78, 54, 1, 9);
    // Pockets = proton dot positions on rings
    for (let i = 0; i < POCKETS4_POS.length; i++) {
      const [bx, by] = POCKETS4_POS[i];
      px(bx-4, by-4, 8, 8, g.pockets[i] ? 3 : 1);
      px(bx-3, by-3, 6, 6, g.pockets[i] ? 5 : 2);
      if (g.pockets[i]) px(bx-2, by-2, 4, 4, 14);
    }
    // Bumpers
    for (let i = 0; i < BUMPERS4.length; i++) drawBumper4(BUMPERS4[i][0], BUMPERS4[i][1], s4BumperFlash[i] > 0);
    // Electron (ball)
    px(g.ball.x-2, g.ball.y-2, 4, 4, 6);
    px(g.ball.x-1, g.ball.y-1, 2, 2, 11);
    // Rocky with arm paddles
    drawRockyPaddle4(107, 210, g.leftPaddle, g.rightPaddle);
    // Z/X keyboard labels at pivot points
    ctx.fillStyle = P[9]; ctx.font = '5px monospace'; ctx.textAlign = 'center';
    ctx.fillText('Z', 58, 207); ctx.fillText('X', 154, 207);
    ctx.textAlign = 'left';
    // HUD
    ctx.fillStyle = P[4]; ctx.font = '6px monospace';
    ctx.textAlign = 'right'; ctx.fillText('MISS ' + g.miss + '/3', W-2, 8);
    ctx.fillStyle = P[12]; ctx.textAlign = 'left';
    ctx.fillText(g.pockets.filter(Boolean).length + '/16', 59, 8);
    ctx.textAlign = 'left';
    // Miss flash
    if (s4FlashTimer > 0) { ctx.fillStyle = 'rgba(233,69,96,0.35)'; ctx.fillRect(0, 0, W, H); }
  }
  else if (state === 'WIN4') {
    winTick++;
    const helmOff = winTick > 200;
    // Grace panel
    px(0, 0, 57, H, 1); px(55, 0, 2, H, 3);
    drawGraceS4(28, 185, helmOff);
    ctx.fillStyle = P[9]; ctx.font = '5px monospace'; ctx.textAlign = 'center';
    ctx.fillText('GRACE', 28, 14); ctx.textAlign = 'left';
    // Bumpers (dim)
    for (let i = 0; i < BUMPERS4.length; i++) drawBumper4(BUMPERS4[i][0], BUMPERS4[i][1], false);
    // Phase 1 (1-70): rings flash in place
    if (winTick <= 70) {
      const flash4 = (winTick % 20 < 10);
      ctx.beginPath(); ctx.arc(80, 78, 16, 0, Math.PI*2); ctx.strokeStyle = P[flash4 ? 6 : 2]; ctx.lineWidth = 1; ctx.stroke();
      ctx.beginPath(); ctx.arc(134, 78, 16, 0, Math.PI*2); ctx.strokeStyle = P[flash4 ? 6 : 2]; ctx.lineWidth = 1; ctx.stroke();
      px(80, 78, 54, 1, flash4 ? 11 : 9);
      for (let i = 0; i < POCKETS4_POS.length; i++) {
        const [bx, by] = POCKETS4_POS[i];
        px(bx-4, by-4, 8, 8, flash4 ? 3 : 2);
        px(bx-3, by-3, 6, 6, flash4 ? 6 : 5);
        if (flash4) px(bx-2, by-2, 4, 4, 11);
      }
    } else {
      // Phase 2 (70-140): O2 molecule animates toward Grace (stops above head)
      const moveT = Math.max(0, Math.min(1, (winTick - 70) / 70));
      const molX = Math.round(107 + (30 - 107) * moveT);
      const molY = Math.round(78 + (120 - 78) * moveT);
      // Draw O2 molecule (two atom circles + double bond)
      px(molX-13, molY-5, 10, 10, 3); px(molX-11, molY-3, 6, 6, 12);
      px(molX+3,  molY-5, 10, 10, 3); px(molX+5,  molY-3, 6, 6, 12);
      px(molX-2, molY-1, 4, 2, 11); px(molX-2, molY+3, 4, 2, 11);
    }
    // Phase 3 (200+): text (after helmet comes off)
    if (winTick > 200) {
      ctx.textAlign = 'center';
      ctx.fillStyle = P[15]; ctx.font = '8px monospace'; ctx.fillText('STAGE 4', W/2, 165);
      ctx.fillStyle = P[12]; ctx.fillText('CLEAR!', W/2, 177);
      ctx.fillStyle = P[14]; ctx.font = '6px monospace'; ctx.fillText('BREATHABLE!', W/2, 189);
      ctx.textAlign = 'left';
    }
    if (winTick > 350) {
      ctx.fillStyle = P[6]; ctx.font = '6px monospace'; ctx.textAlign = 'center';
      ctx.fillText('PRESS SPACE / TAP', W/2, 228);
      ctx.textAlign = 'left';
    }
  }
  else if (state === 'PLAY5') {
    update5();
    drawInterior5();
    drawWalls5();
    drawSnake5();
    drawHUD5();
  }
  else if (state === 'WIN5') {
    winTick++;
    drawInterior5();
    drawWalls5();
    ctx.textAlign = 'center';
    ctx.fillStyle = P[15]; ctx.font = '8px monospace'; ctx.fillText('STAGE 5', W/2, 80);
    ctx.fillStyle = P[12]; ctx.fillText('CLEAR!', W/2, 95);
    ctx.fillStyle = P[6]; ctx.font = '6px monospace';
    ctx.fillText('CHAIN COMPLETE!', W/2, 115);
    ctx.fillStyle = P[14]; ctx.fillText('HAIL MARY', W/2, 130);
    ctx.fillStyle = P[11]; ctx.fillText('IS READY!', W/2, 142);
    // Rocky celebrating at center
    drawRockyS3(W/2, 185, 'cheer_up');
    if (winTick > 200) {
      ctx.fillStyle = P[6]; ctx.font = '6px monospace';
      ctx.fillText('PRESS SPACE / TAP', W/2, 225);
    }
    ctx.textAlign = 'left';
  }
  else if (state === 'GAMEOVER') {
    const sn = gs ? gs.stageNum : 1;
    if (sn === 5) { drawInterior5(); drawWalls5(); }
    if (sn === 4 && gs) {
      const g = gs;
      px(0, 0, 57, H, 1); px(55, 0, 2, H, 3);
      drawGraceS4(28, 185, false);
      ctx.fillStyle = P[9]; ctx.font = '5px monospace'; ctx.textAlign = 'center';
      ctx.fillText('GRACE', 28, 14); ctx.textAlign = 'left';
      ctx.beginPath(); ctx.arc(80, 78, 16, 0, Math.PI*2); ctx.strokeStyle = P[2]; ctx.lineWidth = 1; ctx.stroke();
      ctx.beginPath(); ctx.arc(134, 78, 16, 0, Math.PI*2); ctx.strokeStyle = P[2]; ctx.lineWidth = 1; ctx.stroke();
      px(80, 78, 54, 1, 9);
      for (let i = 0; i < POCKETS4_POS.length; i++) {
        const [bx, by] = POCKETS4_POS[i];
        px(bx-4, by-4, 8, 8, g.pockets[i] ? 3 : 1);
        px(bx-3, by-3, 6, 6, g.pockets[i] ? 5 : 2);
        if (g.pockets[i]) px(bx-2, by-2, 4, 4, 14);
      }
      for (let i = 0; i < BUMPERS4.length; i++) drawBumper4(BUMPERS4[i][0], BUMPERS4[i][1], false);
      drawRockyPaddle4(107, 210, false, false);
      ctx.fillStyle = P[9]; ctx.font = '5px monospace'; ctx.textAlign = 'center';
      ctx.fillText('Z', 58, 207); ctx.fillText('X', 154, 207); ctx.textAlign = 'left';
      ctx.fillStyle = P[4]; ctx.font = '6px monospace';
      ctx.textAlign = 'right'; ctx.fillText('MISS 3/3', W-2, 8);
      ctx.fillStyle = P[12]; ctx.textAlign = 'left';
      ctx.fillText(g.pockets.filter(Boolean).length + '/16', 59, 8);
      ctx.textAlign = 'center';
      ctx.fillStyle = P[4]; ctx.font = '8px monospace'; ctx.fillText('GAME OVER', 109, 170);
      if (gameoverLockTimer <= 0) {
        ctx.fillStyle = P[6]; ctx.font = '5px monospace'; ctx.fillText('PRESS SPACE / TAP', 109, 228);
      }
      ctx.textAlign = 'left';
    } else {
      drawCenterText(
        ['GAME OVER','','STAGE ' + sn,'SCORE: ' + (gs ? (gs.score | 0) : 0),'','PRESS SPACE / TAP'],
        [4,0,11,11,0,6]
      );
    }
  }

  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
