<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>SPACE DOCK</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#000;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  overflow:hidden;
  font-family:monospace;
}
canvas {
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  cursor:none;
}
#hint {
  color:#555;
  font-size:11px;
  margin-top:6px;
  letter-spacing:1px;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">← → / TAP to move</div>
<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');
ctx.imageSmoothingEnabled = false;

// Logical size
const W = 160, H = 240;
// Scale to fit screen
const SCALE = Math.floor(Math.min(window.innerWidth / W, (window.innerHeight - 30) / H));
C.width  = W * SCALE;
C.height = H * SCALE;
ctx.scale(SCALE, SCALE);

// 4-bit palette (16 colors)
const P = [
  '#000000','#1a1a2e','#16213e','#0f3460',
  '#e94560','#ff6b35','#f5c518','#4a90d9',
  '#7ed321','#aaaaaa','#cccccc','#ffffff',
  '#50e3c2','#bd10e0','#ffaaff','#88ff88'
];

// --- State ---
let gs; // game state object
let state = 'START';
let winPhase = 0, winTick = 0, pipeY = 0;

function newGame() {
  gs = {
    tship: { x: W/2, y: 18, dx: 0.7 },
    bship: { x: W/2, y: H - 18 },
    astro: { x: W/2, y: H - 30 },
    caps:  [],
    score: 0,
    miss:  0,
    baseSpeed: 0.9,
    spawnTick: 0,
    spawnInterval: 100,
    frame: 0,
    flashTimer: 0,
  };
  winPhase = 0; winTick = 0; pipeY = 0;
  state = 'PLAY';
}

// --- Input ---
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if ((e.key === ' ' || e.key === 'Enter') && state !== 'PLAY' && state !== 'WIN_ANIM') newGame();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// Touch
let touchX = null;
C.addEventListener('touchstart', e => {
  touchX = e.touches[0].clientX;
  if (state !== 'PLAY' && state !== 'WIN_ANIM') newGame();
  e.preventDefault();
}, { passive:false });
C.addEventListener('touchmove', e => {
  if (state === 'PLAY' && touchX !== null) {
    const dx = (e.touches[0].clientX - touchX) / SCALE;
    gs.astro.x = clamp(gs.astro.x + dx * 0.8, 8, W-8);
    touchX = e.touches[0].clientX;
  }
  e.preventDefault();
}, { passive:false });
C.addEventListener('touchend', () => { touchX = null; }, {passive:false});
C.addEventListener('click', () => {
  if (state !== 'PLAY' && state !== 'WIN_ANIM') newGame();
});

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// --- Drawing primitives ---
function px(x, y, w, h, ci) {
  ctx.fillStyle = P[ci];
  ctx.fillRect(x|0, y|0, w, h);
}

function drawStars() {
  for (let i = 0; i < 40; i++) {
    const sx = (i*37+11) % W;
    const sy = (i*73+19) % H;
    const c  = (i%3===0) ? 11 : 9;
    px(sx, sy, 1, 1, c);
  }
}

function drawTopShip(x, y) {
  // Hail Mary needle — 3-blade horizontal spindle
  // Top blade
  px(x-12, y-3, 24, 1, 6);
  // Main center body
  px(x-18, y-1, 36, 3, 6);
  // Center orange stripe
  px(x-15, y,   30, 1, 5);
  // Bottom blade
  px(x-12, y+3, 24, 1, 6);
  // Gray pointed tips
  px(x-20, y,   2, 1, 9);
  px(x+18, y,   2, 1, 9);
  // Center spine connector
  px(x-2, y-2, 4, 5, 9);
  // Highlight
  px(x-8, y-1, 4, 1, 10);
  // Engine glow (rear)
  px(x-21, y,   2, 1, 4);
}

function drawBottomShip(x, y) {
  // thruster nozzle
  px(x-4, y+7, 8, 3, 5);
  // body
  px(x-12, y-3, 24, 8, 7);
  // deck
  px(x-6, y-7, 12, 4, 3);
  // cockpit
  px(x-3, y-11, 6, 4, 12);
  // airlock
  px(x+8, y-1, 3, 4, 8);
  // detail
  px(x-10, y-1, 20, 1, 12);
}

function drawAstronaut(x, y, flash) {
  const c = flash ? 6 : 4;
  // tether
  ctx.strokeStyle = P[9];
  ctx.lineWidth = 1;
  ctx.beginPath();
  const bx = gs.bship.x + 10, by = gs.bship.y - 2;
  ctx.moveTo(bx|0, by|0);
  ctx.lineTo(x|0, (y-6)|0);
  ctx.stroke();
  // head
  px(x-3, y-10, 6, 5, c);
  px(x-2, y-9, 4, 3, 12); // visor
  // body
  px(x-4, y-5, 8, 7, c);
  // arms
  px(x-8, y-4, 4, 3, 10);
  px(x+4,  y-4, 4, 3, 10);
  // legs
  px(x-3, y+2, 3, 4, c);
  px(x+1,  y+2, 3, 4, c);
}

function drawCapsule(x, y) {
  px(x-2, y-6, 4, 1, 10); // cap
  px(x-3, y-5, 6, 8, 9);  // body
  px(x-1, y-4, 2, 6, 11); // window shine
  px(x-2, y+3, 4, 1, 10); // bottom cap
}

function drawPipe(x1, y1, x2, y2) {
  ctx.strokeStyle = P[9];
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(x1|0, y1|0);
  ctx.lineTo(x2|0, y2|0);
  ctx.stroke();
  ctx.strokeStyle = P[10];
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo((x1-1)|0, y1|0);
  ctx.lineTo((x2-1)|0, y2|0);
  ctx.stroke();
}

function drawHUD() {
  ctx.fillStyle = P[12];
  ctx.font = '6px monospace';
  ctx.fillText('CATCH ' + gs.score + '/15', 2, 8);
  ctx.fillStyle = P[4];
  ctx.fillText('MISS ' + gs.miss + '/3',  W-34, 8);
  // progress bar
  const bw = (gs.score / 15) * (W - 4);
  px(2, H-4, W-4, 2, 1);
  px(2, H-4, bw|0, 2, 8);
}

function drawCenterText(lines, colors) {
  const lineH = 10;
  const total = lines.length * lineH;
  let sy = H/2 - total/2;
  lines.forEach((txt, i) => {
    ctx.fillStyle = P[colors[i] !== undefined ? colors[i] : 11];
    ctx.font = (i === 0 ? '8px' : '6px') + ' monospace';
    ctx.textAlign = 'center';
    ctx.fillText(txt, W/2, sy + i * lineH);
    ctx.textAlign = 'left';
  });
}

// --- Update ---
function update() {
  const g = gs;
  g.frame++;

  // Top ship movement
  g.tship.x += g.tship.dx;
  if (g.tship.x > W - 18) g.tship.dx = -0.7;
  if (g.tship.x < 18)     g.tship.dx =  0.7;

  // Astronaut movement
  const spd = 1.8;
  if (keys['ArrowLeft']  || keys['a'] || keys['A']) g.astro.x = clamp(g.astro.x - spd, 8, W-8);
  if (keys['ArrowRight'] || keys['d'] || keys['D']) g.astro.x = clamp(g.astro.x + spd, 8, W-8);

  // Spawn capsule
  g.spawnTick++;
  if (g.spawnTick >= g.spawnInterval) {
    g.spawnTick = 0;
    g.caps.push({
      x: g.tship.x + (Math.random() - 0.5) * 16,
      y: g.tship.y + 10,
      spd: g.baseSpeed + Math.random() * 0.4
    });
    if (g.spawnInterval > 45) g.spawnInterval -= 2;
  }

  // Capsule physics + collision
  if (g.flashTimer > 0) g.flashTimer--;
  for (let i = g.caps.length - 1; i >= 0; i--) {
    const c = g.caps[i];
    c.y += c.spd;

    // Catch check (astronaut bounding box)
    const ax = g.astro.x, ay = g.astro.y;
    if (c.y > ay - 12 && c.y < ay + 8 && Math.abs(c.x - ax) < 10) {
      g.caps.splice(i, 1);
      g.score++;
      g.baseSpeed += 0.12;
      g.flashTimer = 8;
      if (g.score >= 15) {
        state = 'WIN_ANIM';
        winPhase = 0;
        winTick  = 0;
        pipeY    = g.tship.y + 8;
      }
      continue;
    }

    // Miss check
    if (c.y > H) {
      g.caps.splice(i, 1);
      g.miss++;
      if (g.miss >= 3) state = 'GAMEOVER';
    }
  }
}

function updateWinAnim() {
  winTick++;
  const g = gs;

  // Phase 0: move top ship to center-x
  if (winPhase === 0) {
    g.tship.x += (W/2 - g.tship.x) * 0.07;
    g.tship.y += (H/2 - 60 - g.tship.y) * 0.04;
    if (winTick > 80) { winPhase = 1; winTick = 0; }
  }
  // Phase 1: extend pipe
  else if (winPhase === 1) {
    const target = g.bship.y - 12;
    pipeY = Math.min(pipeY + 2, target);
    if (pipeY >= target) { winPhase = 2; winTick = 0; }
  }
  // Phase 2: hold then win
  else if (winPhase === 2) {
    if (winTick > 60) state = 'WIN';
  }
}

// --- Main loop ---
function loop() {
  // Clear
  ctx.fillStyle = P[0];
  ctx.fillRect(0, 0, W, H);
  drawStars();

  if (state === 'START') {
    drawTopShip(W/2, 24);
    drawBottomShip(W/2, H - 24);
    drawCenterText(
      ['SPACE DOCK', '','CATCH 15 CAPSULES','MISS 3 = GAME OVER','','PRESS SPACE / TAP'],
      [12, 0, 11, 9, 0, 6]
    );
  }
  else if (state === 'PLAY') {
    update();
    const g = gs;
    drawTopShip(g.tship.x, g.tship.y);
    for (const c of g.caps) drawCapsule(c.x, c.y);
    drawBottomShip(g.bship.x, g.bship.y);
    drawAstronaut(g.astro.x, g.astro.y, g.flashTimer > 0);
    drawHUD();
  }
  else if (state === 'WIN_ANIM') {
    updateWinAnim();
    const g = gs;
    drawBottomShip(g.bship.x, g.bship.y);
    drawTopShip(g.tship.x, g.tship.y);
    if (winPhase >= 1) {
      drawPipe(g.tship.x, g.tship.y + 8, g.tship.x, pipeY);
    }
    // Flash "DOCKING..."
    if ((winTick >> 2) % 2 === 0) {
      ctx.fillStyle = P[12];
      ctx.font = '8px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('DOCKING...', W/2, H/2 + 20);
      ctx.textAlign = 'left';
    }
  }
  else if (state === 'WIN') {
    const g = gs;
    drawBottomShip(g.bship.x, g.bship.y);
    drawTopShip(W/2, H/2 - 60);
    drawPipe(W/2, H/2 - 52, W/2, g.bship.y - 12);
    drawCenterText(
      ['DOCKING', 'COMPLETE!', '', 'PRESS SPACE / TAP'],
      [15, 12, 0, 6]
    );
  }
  else if (state === 'GAMEOVER') {
    drawCenterText(
      ['GAME OVER', '', 'CAUGHT: ' + gs.score + '/15', '', 'PRESS SPACE / TAP'],
      [4, 0, 11, 0, 6]
    );
  }

  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
