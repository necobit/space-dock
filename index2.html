<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>SPACE DOCK</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#000;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
  overflow:hidden;
  font-family:monospace;
}
canvas { image-rendering:pixelated; image-rendering:crisp-edges; cursor:none; }
#hint { color:#555; font-size:11px; margin-top:6px; letter-spacing:1px; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">PRESS SPACE / TAP</div>
<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');
const hint = document.getElementById('hint');
ctx.imageSmoothingEnabled = false;

const W = 160, H = 240;
const SCALE = Math.floor(Math.min(window.innerWidth / W, (window.innerHeight - 30) / H));
C.width = W * SCALE;
C.height = H * SCALE;
ctx.scale(SCALE, SCALE);

const P = [
  '#000000','#1a1a2e','#16213e','#0f3460',
  '#e94560','#ff6b35','#f5c518','#4a90d9',
  '#7ed321','#aaaaaa','#cccccc','#ffffff',
  '#50e3c2','#bd10e0','#ffaaff','#88ff88'
];

// ── TUNING (base values for PC; mobile applies SPD_MULT) ──────────
const TSHIP_DX    = 0.7;   // top ship horiz speed (px/frame)
const S1_SPD_BASE = 0.45;  // stage1: capsule fall speed base
const S1_SPD_ACC  = 0.12;  // stage1: fall speed gain per catch
const S2_BAR_BASE = 1.5;   // stage2: bar oscillation (deg/frame)
const S2_BAR_ACC  = 0.5;   // stage2: bar speed gain per hit
const S2_CAP_SPD  = 2.5;   // stage2: capsule launch speed (px/frame)
// ──────────────────────────────────────────────────────────────────

const IS_TOUCH = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
const SPD_MULT    = IS_TOUCH ? 2.0 : 1.0;
const S1_SPD_MULT   = IS_TOUCH ? 2.0 : 0.5;  // Stage1専用乗数（PC=0.5、スマホ=2.0）
const S1_CAP_MULT   = IS_TOUCH ? 1.0 : 1.5;  // Stage1カプセル速度補正（PC=1.5倍）
const S1_SPAWN_MULT = IS_TOUCH ? 1.0 : 2.0;  // Stage1スポーン間隔補正（PC=2倍）
const S2_SPD_MULT   = IS_TOUCH ? 0.5 : 0.25; // Stage2専用乗数
const S2_CAP_MULT   = 1.0;                    // Stage2カプセル追加乗数

let gs;
let state = 'START';
let winPhase = 0, winTick = 0, pipeY = 0;
let selectedStage = 1;
let s3TapDir = null, s3TapTimer = 0;
let s3CountTick = 0;
let s3GuideTick = 0;
const GUIDE_ORDER = ['up','right','left','down'];
const COMPOUNDS4 = ['O2','CO2','NH3','N2','H2','CH4','H2S','SO2','N2O','O3'];
let s4FlashTimer = 0;

function launchStage(n) {
  if (n === 1) newGame1();
  else if (n === 2) newGame2();
  else if (n === 3) newGame3();
  else newGame4();
}

function newGame1() {
  gs = {
    stageNum: 1,
    tship: { x: W/2, y: 18, dx: 1, spd: TSHIP_DX * S1_SPD_MULT * 0.5 },
    bship: { x: W/2, y: H - 18 },
    astro: { x: W/2, y: H - 30 },
    caps:  [],
    score: 0, miss: 0,
    baseSpeed: S1_SPD_BASE * S1_SPD_MULT,
    spawnTick: 0, spawnInterval: 180 * S1_SPAWN_MULT, spawnBase: 240 * S1_SPAWN_MULT,
    frame: 0, flashTimer: 0,
  };
  winPhase = 0; winTick = 0; pipeY = 0;
  state = 'PLAY1';
  hint.textContent = '← → / TAP to move';
}

function newGame2() {
  gs = {
    stageNum: 2,
    tship: { x: W/2, y: 18, dx: TSHIP_DX * S2_SPD_MULT },
    bship: { x: W/2, y: H - 18 },
    astro: { x: W/2, y: H - 30 },
    caps:  [],
    score: 0, miss: 0,
    barAngle: 0, barDir: 1,
    barSpeed: S2_BAR_BASE * S2_SPD_MULT,
    frame: 0, flashTimer: 0,
  };
  winPhase = 0; winTick = 0; pipeY = 0;
  state = 'PLAY2';
  hint.textContent = 'SPACE / TAP to fire';
}

// --- Input ---
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ' || e.key === 'Enter') { handleAction(); e.preventDefault(); }
  if (state === 'SELECT') {
    if (e.key === 'ArrowUp'   || e.key === 'ArrowLeft')  { selectedStage = selectedStage > 1 ? selectedStage - 1 : 4; e.preventDefault(); }
    if (e.key === 'ArrowDown' || e.key === 'ArrowRight') { selectedStage = selectedStage < 4 ? selectedStage + 1 : 1; e.preventDefault(); }
  }
  if (state === 'PLAY3') {
    if (e.key === 'ArrowLeft')  { handleInput3('left');  e.preventDefault(); }
    if (e.key === 'ArrowRight') { handleInput3('right'); e.preventDefault(); }
    if (e.key === 'ArrowUp')    { handleInput3('up');    e.preventDefault(); }
    if (e.key === 'ArrowDown')  { handleInput3('down');  e.preventDefault(); }
  }
  if (state === 'PLAY4') {
    if (e.key === 'z' || e.key === 'Z') { handleCircle4(); e.preventDefault(); }
    if (e.key === 'x' || e.key === 'X') { handleCross4();  e.preventDefault(); }
  }
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

let touchX = null;
C.addEventListener('touchstart', e => {
  touchX = e.touches[0].clientX;
  if (state === 'PLAY3') {
    const rect = C.getBoundingClientRect();
    const gx = (e.touches[0].clientX - rect.left) / SCALE;
    const gy = (e.touches[0].clientY - rect.top)  / SCALE;
    const dx = gx - W/2, dy = gy - (H * 3/4);
    if (Math.abs(dx) > Math.abs(dy)) handleInput3(dx > 0 ? 'right' : 'left');
    else handleInput3(dy > 0 ? 'down' : 'up');
  } else if (state === 'PLAY4') {
    const rect = C.getBoundingClientRect();
    const gx = (e.touches[0].clientX - rect.left) / SCALE;
    if (gx > 53) { if (gx < 107) handleCircle4(); else handleCross4(); }
  } else if (state === 'SELECT') {
    const rect = C.getBoundingClientRect();
    const gy = (e.touches[0].clientY - rect.top) / SCALE;
    if      (gy < 78)  { selectedStage = 1; launchStage(1); }
    else if (gy < 98)  { selectedStage = 2; launchStage(2); }
    else if (gy < 118) { selectedStage = 3; launchStage(3); }
    else if (gy < 138) { selectedStage = 4; launchStage(4); }
    else               { launchStage(selectedStage); }
  } else if (state !== 'PLAY1') {
    handleAction();
  }
  e.preventDefault();
}, { passive: false });
C.addEventListener('touchmove', e => {
  if (state === 'PLAY1' && touchX !== null) {
    const dx = (e.touches[0].clientX - touchX) / SCALE;
    gs.astro.x = clamp(gs.astro.x + dx * 0.8, 8, W - 8);
    touchX = e.touches[0].clientX;
  }
  e.preventDefault();
}, { passive: false });
C.addEventListener('touchend', () => { touchX = null; }, { passive: false });
C.addEventListener('click', e => {
  if (state === 'PLAY3') {
    const rect = C.getBoundingClientRect();
    const gx = (e.clientX - rect.left) / SCALE;
    const gy = (e.clientY - rect.top)  / SCALE;
    const dx = gx - W/2, dy = gy - (H * 3/4);
    if (Math.abs(dx) > Math.abs(dy)) handleInput3(dx > 0 ? 'right' : 'left');
    else handleInput3(dy > 0 ? 'down' : 'up');
  } else if (state === 'PLAY4') {
    const rect = C.getBoundingClientRect();
    const gx = (e.clientX - rect.left) / SCALE;
    if (gx > 53) { if (gx < 107) handleCircle4(); else handleCross4(); }
  } else if (state === 'SELECT') {
    const rect = C.getBoundingClientRect();
    const gy = (e.clientY - rect.top) / SCALE;
    if      (gy < 78)  { selectedStage = 1; launchStage(1); }
    else if (gy < 98)  { selectedStage = 2; launchStage(2); }
    else if (gy < 118) { selectedStage = 3; launchStage(3); }
    else if (gy < 138) { selectedStage = 4; launchStage(4); }
    else               { launchStage(selectedStage); }
  } else {
    handleAction();
  }
});

function handleAction() {
  if (state === 'WIN_ANIM' || state === 'WIN1' || state === 'WIN2' || state === 'PLAY3' || state === 'COUNTDOWN3' || state === 'GUIDE3' || state === 'PLAY4') return;
  if (state === 'PLAY2')    { fireCapsule(); return; }
  if (state === 'PLAY1')    return;
  if (state === 'WIN3' || state === 'WIN4' || state === 'GAMEOVER') {
    state = 'SELECT'; selectedStage = 1;
    hint.textContent = IS_TOUCH ? 'TAP to select' : 'ARROWS + SPACE';
    return;
  }
  if (state === 'START') {
    state = 'SELECT'; selectedStage = 1;
    hint.textContent = IS_TOUCH ? 'TAP to select' : 'ARROWS + SPACE';
    return;
  }
  if (state === 'SELECT') { launchStage(selectedStage); return; }
}

function fireCapsule() {
  if (!gs || gs.caps.length > 0) return;
  const rad = gs.barAngle * Math.PI / 180;
  const spd = S2_CAP_SPD * S2_SPD_MULT * S2_CAP_MULT;
  gs.caps.push({
    x: gs.astro.x, y: gs.astro.y - 10,
    vx: Math.sin(rad) * spd, vy: -Math.cos(rad) * spd,
  });
}

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function px(x, y, w, h, ci) { ctx.fillStyle = P[ci]; ctx.fillRect(x|0, y|0, w, h); }

// --- Drawing ---
function drawStars() {
  for (let i = 0; i < 40; i++) {
    px((i*37+11)%W, (i*73+19)%H, 1, 1, (i%3===0)?11:9);
  }
}

function drawTopShip(x, y) {
  px(x-12, y-3, 24, 1, 6);
  px(x-18, y-1, 36, 3, 6);
  px(x-15, y,   30, 1, 5);
  px(x-12, y+3, 24, 1, 6);
  px(x-20, y,   2,  1, 9);
  px(x+18, y,   2,  1, 9);
  px(x-2,  y-2, 4,  5, 9);
  px(x-8,  y-1, 4,  1, 10);
  px(x-21, y,   2,  1, 4);
}

function drawBottomShip(x, y) {
  px(x-4,  y+7,  8,  3, 5);
  px(x-12, y-3,  24, 8, 11);
  px(x-6,  y-7,  12, 4, 10);
  px(x-3,  y-11, 6,  4, 11);
  px(x+8,  y-1,  3,  4, 10);
  px(x-10, y-1,  20, 1, 9);
}

function drawAstronaut(x, y, flash) {
  const c = flash ? 6 : 4;
  ctx.strokeStyle = P[9]; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo((gs.bship.x+10)|0, (gs.bship.y-2)|0);
  ctx.lineTo(x|0, (y-6)|0);
  ctx.stroke();
  px(x-3, y-10, 6, 5, c);
  px(x-2, y-9,  4, 3, 12);
  px(x-4, y-5,  8, 7, c);
  px(x-8, y-4,  4, 3, 10);
  px(x+4, y-4,  4, 3, 10);
  px(x-3, y+2,  3, 4, c);
  px(x+1, y+2,  3, 4, c);
}

function drawCapsule(x, y) {
  px(x-2, y-6, 4, 1, 10);
  px(x-3, y-5, 6, 8, 9);
  px(x-1, y-4, 2, 6, 11);
  px(x-2, y+3, 4, 1, 10);
}

function drawPipe(x1, y1, x2, y2) {
  ctx.strokeStyle = P[9]; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(x1|0, y1|0); ctx.lineTo(x2|0, y2|0); ctx.stroke();
  ctx.strokeStyle = P[10]; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo((x1-1)|0, y1|0); ctx.lineTo((x2-1)|0, y2|0); ctx.stroke();
}

function drawAimGuides(x, y) {
  const base = y - 12;
  ctx.lineWidth = 1;
  for (const a of [-45, 0, 45]) {
    const rad = a * Math.PI / 180;
    ctx.strokeStyle = (a === 0) ? P[3] : P[2];
    ctx.beginPath();
    ctx.moveTo(x|0, base|0);
    ctx.lineTo((x + Math.sin(rad)*20)|0, (base - Math.cos(rad)*20)|0);
    ctx.stroke();
  }
}

function drawBar(x, y, angle) {
  const rad = angle * Math.PI / 180;
  const ex = x + Math.sin(rad) * 22, ey = y - 12 - Math.cos(rad) * 22;
  ctx.strokeStyle = P[6]; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(x|0, (y-12)|0); ctx.lineTo(ex|0, ey|0); ctx.stroke();
  px(ex-1|0, ey-1|0, 3, 3, 6);
}

function drawHUD1() {
  ctx.fillStyle = P[12]; ctx.font = '6px monospace';
  ctx.fillText('CATCH ' + gs.score + '/15', 2, 8);
  ctx.fillStyle = P[4];
  ctx.fillText('MISS ' + gs.miss + '/3', W-34, 8);
  px(2, H-4, W-4, 2, 1);
  px(2, H-4, ((gs.score/15)*(W-4))|0, 2, 8);
}

function drawHUD2() {
  ctx.fillStyle = P[12]; ctx.font = '6px monospace';
  ctx.fillText('HIT ' + gs.score + '/5', 2, 8);
  ctx.fillStyle = P[4];
  ctx.fillText('MISS ' + gs.miss + '/10', W-40, 8);
  px(2, H-4, W-4, 2, 1);
  px(2, H-4, ((gs.score/5)*(W-4))|0, 2, 8);
}

function drawCenterText(lines, colors) {
  const lineH = 10, total = lines.length * lineH;
  let sy = H/2 - total/2;
  lines.forEach((txt, i) => {
    ctx.fillStyle = P[colors[i] ?? 11];
    ctx.font = (i===0 ? '8px' : '6px') + ' monospace';
    ctx.textAlign = 'center';
    ctx.fillText(txt, W/2, sy + i*lineH);
    ctx.textAlign = 'left';
  });
}

// --- Update Stage 1 ---
function update1() {
  const g = gs; g.frame++;
  g.tship.spd = Math.min(g.tship.spd + 0.003, TSHIP_DX * S1_SPD_MULT);
  g.tship.x += g.tship.dx * g.tship.spd;
  if (g.tship.x > W-18) g.tship.dx = -1;
  if (g.tship.x < 18)   g.tship.dx =  1;

  const spd = 1.8;
  if (keys['ArrowLeft']  || keys['a'] || keys['A']) g.astro.x = clamp(g.astro.x - spd, 8, W-8);
  if (keys['ArrowRight'] || keys['d'] || keys['D']) g.astro.x = clamp(g.astro.x + spd, 8, W-8);

  g.spawnTick++;
  if (g.spawnTick >= g.spawnInterval && g.caps.length === 0) {
    g.spawnTick = 0;
    g.caps.push({ x: g.tship.x + (Math.random()-0.5)*16, y: g.tship.y+10,
                  spd: (g.baseSpeed + Math.random()*0.4*S1_SPD_MULT) * S1_CAP_MULT });
    const minI = 120 * S1_SPAWN_MULT;
    if (g.spawnBase > minI) g.spawnBase -= 4;
    g.spawnInterval = minI + Math.random() * (g.spawnBase - minI);
  }

  if (g.flashTimer > 0) g.flashTimer--;
  for (let i = g.caps.length-1; i >= 0; i--) {
    const c = g.caps[i]; c.y += c.spd;
    const ax = g.astro.x, ay = g.astro.y;
    if (c.y > ay-12 && c.y < ay+8 && Math.abs(c.x-ax) < 10) {
      g.caps.splice(i,1); g.score++;
      g.baseSpeed += S1_SPD_ACC * S1_SPD_MULT;
      g.flashTimer = 8;
      if (g.score >= 15) { state='WIN1'; winTick=0; }
      continue;
    }
    if (c.y > H) { g.caps.splice(i,1); g.miss++; if (g.miss >= 3) state='GAMEOVER'; }
  }
}

// --- Update Stage 2 ---
function update2() {
  const g = gs; g.frame++;
  g.tship.x += g.tship.dx;
  if (g.tship.x > W-18) g.tship.dx = -TSHIP_DX * S2_SPD_MULT;
  if (g.tship.x < 18)   g.tship.dx =  TSHIP_DX * S2_SPD_MULT;

  g.barAngle += g.barSpeed * g.barDir;
  if (g.barAngle >= 45)  { g.barAngle = 45;  g.barDir = -1; }
  if (g.barAngle <= -45) { g.barAngle = -45; g.barDir =  1; }

  if (g.flashTimer > 0) g.flashTimer--;
  for (let i = g.caps.length-1; i >= 0; i--) {
    const c = g.caps[i]; c.x += c.vx; c.y += c.vy;
    const tx = g.tship.x, ty = g.tship.y;
    if (c.y > ty-6 && c.y < ty+6 && Math.abs(c.x-tx) < 20) {
      g.caps.splice(i,1); g.score++;
      g.barSpeed += S2_BAR_ACC * S2_SPD_MULT;
      g.flashTimer = 8;
      if (g.score >= 5) { state='WIN_ANIM'; winPhase=0; winTick=0; pipeY=g.tship.y+8; }
      continue;
    }
    if (c.y < -10 || c.x < -10 || c.x > W+10) {
      g.caps.splice(i,1); g.miss++; if (g.miss >= 10) state='GAMEOVER';
    }
  }
}

// --- Win Animation ---
function updateWinAnim() {
  winTick++;
  const g = gs;
  g.tship.x += (W/2 - g.tship.x) * 0.07;
  g.tship.y += (H/2-60 - g.tship.y) * 0.04;
  const nextState = g.stageNum === 1 ? 'WIN1' : 'WIN2';
  if (winPhase === 0) {
    if (winTick > 80) { winPhase = 1; winTick = 0; pipeY = gs.tship.y + 8; }
  } else if (winPhase === 1) {
    const target = g.bship.y - 12;
    pipeY = Math.min(pipeY + 2, target);
    if (pipeY >= target) { winPhase = 2; winTick = 0; }
  } else if (winPhase === 2) {
    if (winTick > 60) { g.tship.x = W/2; g.tship.y = H/2-60; state = nextState; }
  }
}

// --- Stage 3 ---
const GESTURES3 = ['right','left','up','down'];

function drawAstronautS3(cx, cy, gesture) {
  const hy = cy - 28;           // helmet top y
  // Helmet
  px(cx-4, hy,    8, 8, 9);
  px(cx-3, hy+1,  6, 6, 10);
  px(cx-2, hy+2,  4, 4, 12);   // visor (cyan)
  px(cx-2, hy+3,  2, 1, 11);   // shine
  // Neck
  px(cx-2, hy+8,  4, 2, 9);
  // Torso (red)
  px(cx-5, hy+10, 10, 14, 4);
  px(cx-3, hy+12,  6,  4, 5);  // chest pack
  px(cx-5, hy+20, 10,  2, 5);  // belt
  // Legs + boots
  px(cx-5, hy+24, 4, 12, 4);
  px(cx+1, hy+24, 4, 12, 4);
  px(cx-5, hy+36, 4,  3, 9);
  px(cx+1, hy+36, 4,  3, 9);
  // Arms
  const sy = hy + 10;           // shoulder y
  const lx = cx - 9, rx = cx + 5;
  if (gesture === 'up') {
    px(lx, sy-12, 4, 12, 4); px(lx, sy-16, 4, 4, 9);
    px(rx, sy-12, 4, 12, 4); px(rx, sy-16, 4, 4, 9);
  } else if (gesture === 'right') {
    px(lx, sy, 4, 12, 4); px(lx, sy+12, 4, 4, 9);        // left arm down
    px(rx,   sy+2, 8, 4, 4); px(rx+7, sy-2, 7, 4, 4);    // right arm diagonal up-right
    px(rx+14, sy-5, 5, 6, 9);                              // right glove
  } else if (gesture === 'left') {
    px(rx, sy, 4, 12, 4); px(rx, sy+12, 4, 4, 9);         // right arm down
    px(cx-13, sy+2, 8, 4, 4); px(cx-20, sy-2, 7, 4, 4);  // left arm diagonal up-left (connected at cx-5)
    px(cx-25, sy-5, 5, 6, 9);                              // left glove
  } else if (gesture === 'idle') {
    px(lx, sy, 4, 12, 4); px(lx, sy+12, 4, 4, 9);
    px(rx, sy, 4, 12, 4); px(rx, sy+12, 4, 4, 9);
  } else { // 'down' - right arm diagonal-DOWN, thumb pointing up
    px(lx, sy, 4, 12, 4); px(lx, sy+12, 4, 4, 9);    // left arm down
    px(rx,   sy+2, 8, 4, 4); px(rx+7, sy+6, 7, 4, 4); // right arm diagonal downward
    px(rx+14, sy+4, 5, 6, 9);                           // fist
    px(rx+15, sy-2, 2, 8, 11);                          // thumb pointing UP
  }
}

function drawRockyS3(cx, cy, rockyState) {
  // Body
  px(cx-11, cy-6,  22, 12, 9);
  px(cx-9,  cy-9,  18, 18, 9);
  px(cx-13, cy-2,  26,  4, 9);
  // Texture
  px(cx-4, cy-2, 4, 4, 1); px(cx+3, cy+2, 3, 3, 1); px(cx-7, cy+2, 3, 3, 1);
  // Single eye mark (emerald green)
  px(cx-2, cy-5, 4, 4, 12);
  // Lower 3 legs (static)
  px(cx-18, cy+7,  8, 2, 9);
  px(cx+13, cy+3,  9, 2, 9);
  px(cx+11, cy+8,  8, 2, 9);
  // Upper 2 arms (move with state)
  if (rockyState === 'cheer_up') {
    // Both arms raised - banzai
    px(cx-22, cy-10, 10, 2, 9);
    px(cx+12, cy-10, 10, 2, 9);
  } else if (rockyState === 'point_left') {
    // Left arm raised high (same height as cheer_up), right normal
    px(cx-22, cy-10, 10, 2, 9);
    px(cx+12, cy-3,  10, 2, 9);
  } else if (rockyState === 'point_right') {
    // Right arm raised high, left normal
    px(cx-22, cy-3,  10, 2, 9);
    px(cx+12, cy-10, 10, 2, 9);
  } else if (rockyState === 'thumbs_down') {
    // Left arm normal, right arm stretched far out then finger pointing down
    px(cx-22, cy-3,  10, 2, 9);
    px(cx+12, cy-3,  18, 2, 9);  // long arm stretching right
    px(cx+28, cy-3,   2, 10, 9); // bends sharply down
    px(cx+26, cy+7,   6, 2, 5);  // orange finger tip (down)
  } else if (rockyState === 'sad') {
    // Both arms drooping
    px(cx-20, cy+5,  10, 2, 9);
    px(cx+10, cy+5,  10, 2, 9);
  } else { // idle
    px(cx-22, cy-3,  10, 2, 9);
    px(cx+12, cy-3,  10, 2, 9);
  }
}

function drawHUD3() {
  const g = gs;
  ctx.fillStyle = P[12]; ctx.font = '6px monospace';
  ctx.fillText('HIT ' + g.score + '/20', 2, 8);
  ctx.fillStyle = P[4];
  ctx.fillText('MISS ' + g.miss + '/3', W-34, 8);
  if (g.phase === 'show') {
    const maxT = Math.max(54, Math.round(180 - g.score * (180-54) / 19));
    px(2, 116, W-4, 2, 1);
    px(2, 116, ((g.timer / maxT) * (W-4))|0, 2, g.timer < 20 ? 4 : 6);
  }
  if (g.phase === 'result') {
    ctx.textAlign = 'center'; ctx.font = '8px monospace';
    ctx.fillStyle = g.resultOk ? P[8] : P[4];
    ctx.fillText(g.resultOk ? 'OK!' : 'MISS!', W/2, 118);
    ctx.textAlign = 'left';
  }
}

function newGame3() {
  gs = { stageNum: 3, score: 0, miss: 0,
         gesture: null, timer: 0, phase: 'show',
         resultTimer: 0, resultOk: false, rockyState: 'idle', frame: 0 };
  winTick = 0; winPhase = 0; pipeY = 0;
  nextRound3();
  s3CountTick = 0;
  s3GuideTick = 0;
  state = 'GUIDE3';
  hint.textContent = '';
}

function nextRound3() {
  const g = gs;
  g.gesture    = GESTURES3[Math.floor(Math.random() * 4)];
  g.timer      = Math.max(54, Math.round(180 - g.score * (180-54) / 19));
  g.phase      = 'show';
  g.rockyState = 'idle';
}

function update3() {
  const g = gs; g.frame++;
  if (s3TapTimer > 0) s3TapTimer--;
  if (g.phase === 'show') {
    if (--g.timer <= 0) {
      g.miss++; g.resultOk = false; g.rockyState = 'sad';
      g.phase = 'result'; g.resultTimer = 40;
    }
  } else if (g.phase === 'result') {
    if (--g.resultTimer <= 0) {
      if (g.miss >= 3)   { state = 'GAMEOVER'; return; }
      if (g.score >= 20) { state = 'WIN3'; winTick = 0; return; }
      g.phase = 'neutral'; g.neutralTimer = 60; g.gesture = null; g.rockyState = 'idle';
    }
  } else if (g.phase === 'neutral') {
    if (--g.neutralTimer <= 0) nextRound3();
  }
}

function handleInput3(dir) {
  if (!gs || gs.stageNum !== 3 || gs.phase !== 'show') return;
  s3TapDir = dir; s3TapTimer = 20;
  const g = gs;
  if (dir === g.gesture) {
    g.score++; g.resultOk = true;
    if      (dir === 'up')    g.rockyState = 'cheer_up';
    else if (dir === 'left')  g.rockyState = 'point_left';
    else if (dir === 'right') g.rockyState = 'point_right';
    else                      g.rockyState = 'thumbs_down';
  } else {
    g.miss++;  g.resultOk = false; g.rockyState = 'sad';
  }
  g.phase = 'result'; g.resultTimer = 35;
}

function drawArrow3(dir, highlight) {
  const c = highlight ? 6 : 7;
  if (dir === 'up') {
    px(79, 123, 2, 2, c); px(77, 125, 6, 2, c); px(75, 127, 10, 2, c); px(79, 129, 2, 10, c);
  } else if (dir === 'down') {
    px(79, 220, 2, 10, c); px(75, 230, 10, 2, c); px(77, 232, 6, 2, c); px(79, 234, 2, 2, c);
  } else if (dir === 'left') {
    px(4,  177, 2, 2, c); px(6,  175, 2, 6, c); px(8,  173, 2, 10, c); px(10, 177, 12, 2, c);
  } else {
    px(138, 177, 12, 2, c); px(150, 173, 2, 10, c); px(152, 175, 2, 6, c); px(154, 177, 2, 2, c);
  }
}

function drawTunnel3() {
  ctx.fillStyle = P[1]; ctx.fillRect(0, 0, W, H);
  // Concentric rectangular rings converging to vanishing point (80,120)
  // Each step: dx=12, dy=18 to maintain circular proportions on 160x240
  const rings = [
    [0,  0,   160, 240, 2],
    [12, 18,  136, 204, 3],
    [24, 36,  112, 168, 2],
    [36, 54,   88, 132, 3],
    [48, 72,   64,  96, 2],
    [58, 87,   44,  66, 7],
    [68,102,   24,  36,12],
  ];
  for (const [x, y, w, h, ci] of rings) {
    if (w < 4 || h < 4) continue;
    px(x,     y,     w, 2, ci);   // top
    px(x,     y+h-2, w, 2, ci);   // bottom
    px(x,     y,     2, h, ci);   // left
    px(x+w-2, y,     2, h, ci);   // right
  }
  px(78, 117, 4, 6, 12);  // vanishing point
}

// --- Stage 4 ---
function drawGraceS4(cx, cy, helmetOff) {
  const hy = cy - 28;
  if (!helmetOff) {
    px(cx-4, hy,   8, 8, 9);
    px(cx-3, hy+1, 6, 6, 10);
    px(cx-2, hy+2, 4, 4, 12);
    px(cx-2, hy+3, 2, 1, 11);
  } else {
    px(cx-4, hy,   8, 8, 14);
    px(cx-3, hy+2, 2, 2, 5);
    px(cx+1, hy+2, 2, 2, 5);
    px(cx-2, hy+5, 4, 1, 4);
  }
  px(cx-2, hy+8,  4, 2, 9);
  px(cx-5, hy+10, 10, 14, 4);
  px(cx-3, hy+12,  6,  4, 5);
  px(cx-5, hy+20, 10,  2, 5);
  px(cx-5, hy+24, 4, 12, 4);
  px(cx+1, hy+24, 4, 12, 4);
  px(cx-5, hy+36, 4,  3, 9);
  px(cx+1, hy+36, 4,  3, 9);
  const sy = hy + 10, lx = cx - 9, rx = cx + 5;
  px(lx, sy, 4, 12, 4); px(lx, sy+12, 4, 4, 9);
  px(rx, sy, 4, 12, 4); px(rx, sy+12, 4, 4, 9);
}

function drawCapsule4(cx, cy, openAmt) {
  // openAmt: 0=closed, 1=fully open. Halves split apart.
  const gap = Math.round(openAmt * 20);
  // Top half
  px(cx-8, cy-gap-14, 16, 2, 10);
  px(cx-10, cy-gap-12, 20, 14, 9);
  px(cx-6,  cy-gap-11, 12, 10, 3);
  px(cx-4,  cy-gap-9,   8,  6, 7);
  // Bottom half
  px(cx-10, cy+gap,    20, 14, 9);
  px(cx-6,  cy+gap+1,  12, 10, 3);
  px(cx-8,  cy+gap+14, 16,  2, 10);
}

function drawMaru4(cx, cy) {
  const c = 8;
  px(cx-8, cy-14, 16, 2, c); px(cx-8, cy+12,  16, 2, c);
  px(cx-14, cy-8,  2, 16, c); px(cx+12, cy-8,  2, 16, c);
  px(cx-12, cy-12, 4, 4, c); px(cx+8, cy-12, 4, 4, c);
  px(cx-12, cy+8,  4, 4, c); px(cx+8, cy+8,  4, 4, c);
}

function drawBatsu4(cx, cy) {
  const c = 4;
  for (let i = -8; i <= 8; i += 2) {
    px(cx+i-1, cy+i-1, 2, 2, c);
    px(cx-i-1, cy+i-1, 2, 2, c);
  }
}

function newGame4() {
  gs = { stageNum: 4, score: 0, miss: 0,
         phase: 'travel', capsuleX: W+10,
         capOpenTimer: 0, compound: null, timer: 0,
         resultTimer: 0, frame: 0 };
  winTick = 0; s4FlashTimer = 0;
  gs.compound = pickCompound4();
  state = 'PLAY4';
  hint.textContent = IS_TOUCH ? '左=○  右=×' : 'Z=○  X=×';
}

function pickCompound4() {
  const nonO2 = COMPOUNDS4.filter(c => c !== 'O2');
  return Math.random() < 0.25 ? 'O2' : nonO2[Math.floor(Math.random() * nonO2.length)];
}

function nextRound4() {
  const g = gs;
  g.compound = pickCompound4();
  g.phase = 'travel';
  g.capsuleX = W + 10;
  g.capOpenTimer = 0;
}

function update4() {
  const g = gs; g.frame++;
  if (s4FlashTimer > 0) s4FlashTimer--;
  if (g.phase === 'travel') {
    g.capsuleX -= 1.5;
    if (g.capsuleX <= 107) { g.capsuleX = 107; g.phase = 'open'; g.capOpenTimer = 0; }
  } else if (g.phase === 'open') {
    g.capOpenTimer++;
    if (g.capOpenTimer >= 25) { g.phase = 'show'; g.timer = 120; }
  } else if (g.phase === 'show') {
    if (--g.timer <= 0) nextRound4();
  } else if (g.phase === 'result') {
    if (--g.resultTimer <= 0) {
      if (g.miss >= 3) { state = 'GAMEOVER'; return; }
      nextRound4();
    }
  }
}

function handleCircle4() {
  if (!gs || gs.stageNum !== 4 || gs.phase !== 'show') return;
  const g = gs;
  if (g.compound === 'O2') { state = 'WIN4'; winTick = 0; }
  else { g.miss++; s4FlashTimer = 50; g.phase = 'result'; g.resultTimer = 50; }
}

function handleCross4() {
  if (!gs || gs.stageNum !== 4 || gs.phase !== 'show') return;
  nextRound4();
}

// --- Main Loop ---
function loop() {
  ctx.fillStyle = P[0]; ctx.fillRect(0, 0, W, H);
  drawStars();

  if (state === 'START') {
    drawTopShip(W/2, 24);
    drawBottomShip(W/2, H-24);
    drawCenterText(
      ['SPACE DOCK','','PRESS SPACE / TAP'],
      [12,0,6]
    );
    ctx.fillStyle = P[5]; ctx.font = '5px monospace';
    ctx.textAlign = 'right'; ctx.fillText('necobit', W-2, H-3);
    ctx.textAlign = 'left';
  }
  else if (state === 'SELECT') {
    drawTopShip(W/2, 24);
    ctx.textAlign = 'center';
    ctx.fillStyle = P[12]; ctx.font = '8px monospace';
    ctx.fillText('SELECT STAGE', W/2, 50);
    for (let i = 1; i <= 4; i++) {
      const y = 68 + (i-1) * 20;
      const sel = (i === selectedStage);
      ctx.fillStyle = sel ? P[6] : P[9];
      ctx.font = (sel ? '8px' : '6px') + ' monospace';
      ctx.fillText((sel ? '> ' : '  ') + 'STAGE ' + i, W/2, y);
    }
    ctx.fillStyle = P[3]; ctx.font = '6px monospace';
    ctx.fillText(IS_TOUCH ? 'TAP to select' : 'ARROWS + SPACE', W/2, 148);
    ctx.textAlign = 'left';
  }
  else if (state === 'PLAY1') {
    update1();
    const g = gs;
    drawTopShip(g.tship.x, g.tship.y);
    for (const c of g.caps) drawCapsule(c.x, c.y);
    drawBottomShip(g.bship.x, g.bship.y);
    drawAstronaut(g.astro.x, g.astro.y, g.flashTimer > 0);
    drawHUD1();
  }
  else if (state === 'PLAY2') {
    update2();
    const g = gs;
    drawTopShip(g.tship.x, g.tship.y);
    for (const c of g.caps) drawCapsule(c.x, c.y);
    drawBottomShip(g.bship.x, g.bship.y);
    drawAimGuides(g.astro.x, g.astro.y);
    drawBar(g.astro.x, g.astro.y, g.barAngle);
    drawAstronaut(g.astro.x, g.astro.y, g.flashTimer > 0);
    drawHUD2();
  }
  else if (state === 'WIN_ANIM') {
    updateWinAnim();
    const g = gs;
    drawBottomShip(g.bship.x, g.bship.y);
    drawTopShip(g.tship.x, g.tship.y);
    if (winPhase >= 1) drawPipe(g.tship.x, g.tship.y+8, g.tship.x, pipeY);
    if ((winTick >> 2) % 2 === 0) {
      ctx.fillStyle = P[12]; ctx.font = '8px monospace'; ctx.textAlign = 'center';
      ctx.fillText('DOCKING...', W/2, H/2+20); ctx.textAlign = 'left';
    }
  }
  else if (state === 'WIN1') {
    winTick++;
    drawTopShip(W/2, 24);
    drawBottomShip(W/2, H-24);
    drawCenterText(
      ['STAGE 1','COMPLETE!','','STAGE 2...'],
      [15,12,0,6]
    );
    if (winTick > 120) newGame2();
  }
  else if (state === 'WIN2') {
    winTick++;
    const g = gs;
    drawBottomShip(g.bship.x, g.bship.y);
    drawTopShip(W/2, H/2-60);
    drawPipe(W/2, H/2-52, W/2, g.bship.y-12);
    drawCenterText(
      ['STAGE 2','COMPLETE!','','STAGE 3...'],
      [15,12,0,6]
    );
    if (winTick > 120) newGame3();
  }
  else if (state === 'GUIDE3') {
    s3GuideTick++;
    if (s3GuideTick > 540) {
      s3CountTick = 0;
      state = 'COUNTDOWN3';
    } else {
      drawTunnel3();
      px(0, H/2, W, 1, 9);
      ctx.textAlign = 'center'; ctx.font = '6px monospace';
      ctx.fillStyle = P[6]; ctx.fillText('HOW TO PLAY', W/2, 14);
      ctx.textAlign = 'left';
      if (s3GuideTick <= 60) {
        drawAstronautS3(W/2, 68, 'idle');
        drawRockyS3(W/2, 178, 'idle');
        for (const d of GESTURES3) drawArrow3(d, false);
      } else {
        const guideIdx = Math.min(Math.floor((s3GuideTick - 61) / 120), 3);
        const guideDir = GUIDE_ORDER[guideIdx];
        const rockyGuide = guideDir === 'up' ? 'cheer_up' : guideDir === 'right' ? 'point_right' : guideDir === 'left' ? 'point_left' : 'thumbs_down';
        drawAstronautS3(W/2, 68, guideDir);
        drawRockyS3(W/2, 178, rockyGuide);
        for (const d of GESTURES3) drawArrow3(d, d === guideDir);
      }
    }
  }
  else if (state === 'COUNTDOWN3') {
    s3CountTick++;
    if (s3CountTick > 210) {
      state = 'PLAY3';
      hint.textContent = IS_TOUCH ? 'TAP direction on Rocky' : '← → ↑ ↓';
    } else {
      drawTunnel3();
      px(0, H/2, W, 1, 9);
      drawAstronautS3(W/2, 68, 'idle');
      drawRockyS3(W/2, 178, 'idle');
      for (const d of GESTURES3) drawArrow3(d, true);
      const n = s3CountTick <= 60 ? '3' : s3CountTick <= 120 ? '2' : s3CountTick <= 180 ? '1' : 'GO!';
      ctx.textAlign = 'center'; ctx.font = '36px monospace';
      ctx.fillStyle = s3CountTick > 180 ? P[8] : P[6];
      ctx.fillText(n, W/2, H/2 + 12);
      ctx.textAlign = 'left';
    }
  }
  else if (state === 'PLAY3') {
    update3();
    const g = gs;
    drawTunnel3();
    px(0, H/2, W, 1, 9);                      // dividing line
    drawAstronautS3(W/2, 68, g.gesture || 'idle');
    drawRockyS3(W/2, 178, g.rockyState);
    for (const d of GESTURES3) drawArrow3(d, s3TapDir === d && s3TapTimer > 0);
    drawHUD3();
  }
  else if (state === 'WIN3') {
    winTick++;
    drawTunnel3();
    // Characters side by side
    ctx.textAlign = 'center';
    ctx.fillStyle = P[15]; ctx.font = '8px monospace'; ctx.fillText('STAGE 3', W/2, 18);
    ctx.fillStyle = P[12]; ctx.fillText('CLEAR!', W/2, 30);
    ctx.fillStyle = P[14]; ctx.fillText('FRIENDS!', W/2, 46);
    ctx.font = '6px monospace'; ctx.fillText('2\u4EBA\u306F\u4EF2\u826F\u304F\u306A\u3063\u305F', W/2, 58);
    ctx.textAlign = 'left';
    drawAstronautS3(58, 158, 'up');
    ctx.fillStyle = P[4]; ctx.font = '12px monospace'; ctx.textAlign = 'center';
    ctx.fillText('\u2665', W/2, 148);
    ctx.textAlign = 'left';
    drawRockyS3(106, 172, 'cheer_up');
    if (winTick > 200) {
      ctx.fillStyle = P[6]; ctx.font = '6px monospace'; ctx.textAlign = 'center';
      ctx.fillText('PRESS SPACE / TAP', W/2, 228);
      ctx.textAlign = 'left';
    }
  }
  else if (state === 'PLAY4') {
    update4();
    const g = gs;
    // Left panel (Rocky)
    px(0, 0, 53, H, 1);
    px(51, 0, 3, H, 3); px(52, 0, 1, H, 7);
    drawRockyS3(26, 148, 'idle');
    ctx.fillStyle = P[9]; ctx.font = '5px monospace'; ctx.textAlign = 'center';
    ctx.fillText('ROCKY', 26, 22); ctx.textAlign = 'left';
    // Grace (right side, bottom)
    drawGraceS4(140, 185, false);
    // Capsule animation
    const capY = 108;
    if (g.phase === 'travel') {
      drawCapsule4(g.capsuleX, capY, 0);
    } else if (g.phase === 'open') {
      drawCapsule4(107, capY, g.capOpenTimer / 25);
    } else if (g.phase === 'show' || g.phase === 'result') {
      drawCapsule4(107, capY, 1);
      ctx.fillStyle = P[11]; ctx.font = '9px monospace'; ctx.textAlign = 'center';
      ctx.fillText(g.compound, 107, capY + 5);
      ctx.textAlign = 'left';
    }
    // ○× buttons (bottom of right panel)
    drawMaru4(76, 210);
    drawBatsu4(136, 210);
    px(107, 192, 1, 30, 3);
    // Timer bar
    if (g.phase === 'show') {
      px(55, 232, 104, 3, 2);
      px(55, 232, Math.round((g.timer / 120) * 104), 3, g.timer < 60 ? 4 : 6);
    }
    // HUD
    ctx.fillStyle = P[4]; ctx.font = '6px monospace';
    ctx.textAlign = 'right'; ctx.fillText('MISS ' + g.miss + '/3', W-2, 8);
    ctx.textAlign = 'left';
    // Miss flash overlay
    if (s4FlashTimer > 0) {
      ctx.fillStyle = 'rgba(233,69,96,0.35)'; ctx.fillRect(0, 0, W, H);
    }
  }
  else if (state === 'WIN4') {
    winTick++;
    px(0, 0, 53, H, 1);
    px(51, 0, 3, H, 3); px(52, 0, 1, H, 7);
    drawRockyS3(26, 148, 'cheer_up');
    drawGraceS4(107, 160, true);
    drawCapsule4(107, 100, 1);
    ctx.fillStyle = P[8]; ctx.font = '9px monospace'; ctx.textAlign = 'center';
    ctx.fillText('O2', 107, 105);
    ctx.fillStyle = P[15]; ctx.font = '8px monospace'; ctx.fillText('STAGE 4', 107, 52);
    ctx.fillStyle = P[12]; ctx.fillText('CLEAR!', 107, 64);
    ctx.fillStyle = P[14]; ctx.font = '6px monospace'; ctx.fillText('BREATHABLE!', 107, 76);
    ctx.fillStyle = P[4]; ctx.font = '10px monospace'; ctx.fillText('♥', 68, 124);
    ctx.textAlign = 'left';
    if (winTick > 180) {
      ctx.fillStyle = P[6]; ctx.font = '6px monospace'; ctx.textAlign = 'center';
      ctx.fillText('PRESS SPACE / TAP', W/2, 228);
      ctx.textAlign = 'left';
    }
  }
  else if (state === 'GAMEOVER') {
    const sn = gs ? gs.stageNum : 1;
    drawCenterText(
      ['GAME OVER','','STAGE ' + sn,'SCORE: ' + (gs?gs.score:0),'','PRESS SPACE / TAP'],
      [4,0,11,11,0,6]
    );
  }

  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
